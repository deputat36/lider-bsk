name: Navigator v2 deal API smoke

on:
  workflow_dispatch:
    inputs:
      deal_id:
        description: 'Deal UUID to smoke-test with the authenticated user JWT'
        required: true
        type: string
      compare_direct_rpc:
        description: 'Also compare payload shape with direct nav_v2_get_deal_card RPC'
        required: false
        default: false
        type: boolean
      supabase_url:
        description: 'Supabase project URL'
        required: false
        default: 'https://ofewxuqfjhamgerwzull.supabase.co'
        type: string

permissions:
  contents: read

jobs:
  smoke-nav-v2-deal-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate smoke test scripts
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/nav_v2_deal_api_auth_guard_test.mjs
          node --check tools/nav_v2_deal_api_smoke_test.mjs

      - name: Validate deal id input
        shell: bash
        env:
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
        run: |
          set -euo pipefail
          if [[ ! "${NAV_V2_DEAL_ID}" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo 'workflow_dispatch input deal_id must be a UUID.' >&2
            exit 1
          fi
          echo 'Deal id input has UUID format.'

      - name: Validate Supabase URL input
        shell: bash
        env:
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
          NAV_V2_ALLOWED_SUPABASE_URL: 'https://ofewxuqfjhamgerwzull.supabase.co'
        run: |
          set -euo pipefail
          if [ "${NAV_V2_SUPABASE_URL}" != "${NAV_V2_ALLOWED_SUPABASE_URL}" ]; then
            echo 'workflow_dispatch input supabase_url must match the production Supabase project URL.' >&2
            exit 1
          fi
          echo 'Supabase URL input matches the production project.'

      - name: Verify unauthenticated requests are rejected
        shell: bash
        env:
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
        run: |
          set -euo pipefail
          result="$(node tools/nav_v2_deal_api_auth_guard_test.mjs)"
          echo "$result"
          {
            echo '### Navigator v2 deal API auth guard'
            echo ''
            echo 'Unauthenticated request was rejected as expected.'
            echo ''
            echo '```json'
            echo "$result"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run authenticated smoke test
        shell: bash
        env:
          NAV_V2_JWT: ${{ secrets.NAV_V2_JWT }}
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
          INPUT_COMPARE_DIRECT_RPC: ${{ inputs.compare_direct_rpc }}
        run: |
          set -euo pipefail
          if [ -z "${NAV_V2_JWT:-}" ]; then
            echo 'Repository secret NAV_V2_JWT is required for this manual smoke test.' >&2
            exit 1
          fi
          compare='0'
          if [ "${INPUT_COMPARE_DIRECT_RPC}" = 'true' ]; then
            compare='1'
          fi
          result="$(NAV_V2_COMPARE_DIRECT_RPC="$compare" node tools/nav_v2_deal_api_smoke_test.mjs)"
          echo "$result"
          {
            echo '### Navigator v2 deal API authenticated smoke'
            echo ''
            echo 'Authenticated get_deal_card smoke test completed.'
            echo ''
            echo '```json'
            echo "$result"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
