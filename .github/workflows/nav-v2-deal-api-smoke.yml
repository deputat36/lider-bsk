name: Navigator v2 deal API smoke

on:
  workflow_dispatch:
    inputs:
      deal_id:
        description: 'Deal UUID to smoke-test with the authenticated user JWT'
        required: true
        type: string
      read_action:
        description: 'Read action to smoke-test'
        required: false
        default: 'get_deal_card'
        type: choice
        options:
          - get_deal_card
          - get_deal_card_lite
      compare_direct_rpc:
        description: 'Also compare payload shape with matching direct nav_v2 read RPC'
        required: false
        default: false
        type: boolean
      preflight_only:
        description: 'Only validate JWT, deal id, read action, and API key locally; do not call Edge Function/direct RPC'
        required: false
        default: false
        type: boolean
      supabase_url:
        description: 'Supabase project URL'
        required: false
        default: 'https://ofewxuqfjhamgerwzull.supabase.co'
        type: string

permissions:
  contents: read

jobs:
  smoke-nav-v2-deal-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate smoke test scripts
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/nav_v2_deal_api_auth_guard_test.mjs
          node --check tools/nav_v2_deal_api_smoke_test.mjs

      - name: Validate deal id input
        shell: bash
        env:
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
        run: |
          set -euo pipefail
          if [[ ! "${NAV_V2_DEAL_ID}" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo 'workflow_dispatch input deal_id must be a UUID.' >&2
            exit 1
          fi
          echo 'Deal id input has UUID format.'

      - name: Validate read action input
        shell: bash
        env:
          NAV_V2_ACTION: ${{ inputs.read_action }}
        run: |
          set -euo pipefail
          if [ "${NAV_V2_ACTION}" != 'get_deal_card' ] && [ "${NAV_V2_ACTION}" != 'get_deal_card_lite' ]; then
            echo 'workflow_dispatch input read_action must be get_deal_card or get_deal_card_lite.' >&2
            exit 1
          fi
          echo 'Read action input is supported.'

      - name: Validate Supabase URL input
        shell: bash
        env:
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
          NAV_V2_ALLOWED_SUPABASE_URL: 'https://ofewxuqfjhamgerwzull.supabase.co'
        run: |
          set -euo pipefail
          if [ "${NAV_V2_SUPABASE_URL}" != "${NAV_V2_ALLOWED_SUPABASE_URL}" ]; then
            echo 'workflow_dispatch input supabase_url must match the production Supabase project URL.' >&2
            exit 1
          fi
          echo 'Supabase URL input matches the production project.'

      - name: Validate smoke mode inputs
        shell: bash
        env:
          INPUT_COMPARE_DIRECT_RPC: ${{ inputs.compare_direct_rpc }}
          INPUT_PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
        run: |
          set -euo pipefail
          if [ "${INPUT_PREFLIGHT_ONLY}" = 'true' ] && [ "${INPUT_COMPARE_DIRECT_RPC}" = 'true' ]; then
            echo 'workflow_dispatch inputs preflight_only and compare_direct_rpc cannot both be true because preflight-only mode does not call direct RPC.' >&2
            exit 1
          fi
          echo 'Smoke mode inputs are compatible.'

      - name: Verify unauthenticated requests are rejected
        if: ${{ !inputs.preflight_only }}
        shell: bash
        env:
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
          NAV_V2_ACTION: ${{ inputs.read_action }}
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
        run: |
          set -euo pipefail
          result="$(node tools/nav_v2_deal_api_auth_guard_test.mjs)"
          echo "$result"
          {
            echo '### Navigator v2 deal API auth guard'
            echo ''
            echo "Unauthenticated ${NAV_V2_ACTION} request was rejected as expected."
            echo ''
            echo '```json'
            echo "$result"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run authenticated smoke test
        shell: bash
        env:
          NAV_V2_JWT: ${{ secrets.NAV_V2_JWT }}
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
          NAV_V2_ACTION: ${{ inputs.read_action }}
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
          INPUT_COMPARE_DIRECT_RPC: ${{ inputs.compare_direct_rpc }}
          INPUT_PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
        run: |
          set -euo pipefail
          if [ -z "${NAV_V2_JWT:-}" ]; then
            echo 'Repository secret NAV_V2_JWT is required for this manual smoke test.' >&2
            exit 1
          fi
          compare='0'
          if [ "${INPUT_COMPARE_DIRECT_RPC}" = 'true' ]; then
            compare='1'
          fi
          preflight='0'
          if [ "${INPUT_PREFLIGHT_ONLY}" = 'true' ]; then
            preflight='1'
          fi
          result="$(NAV_V2_COMPARE_DIRECT_RPC="$compare" NAV_V2_PREFLIGHT_ONLY="$preflight" node tools/nav_v2_deal_api_smoke_test.mjs)"
          echo "$result"
          summary="Authenticated ${NAV_V2_ACTION} smoke test completed."
          if [ "$preflight" = '1' ]; then
            summary="Authenticated ${NAV_V2_ACTION} preflight-only validation completed without Edge Function or direct RPC calls."
          fi
          {
            echo '### Navigator v2 deal API authenticated smoke'
            echo ''
            echo "$summary"
            echo ''
            echo '```json'
            echo "$result"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
