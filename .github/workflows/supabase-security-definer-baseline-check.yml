name: Supabase SECURITY DEFINER baseline check

on:
  push:
    branches: [main]
    paths:
      - 'docs/SUPABASE_SECURITY_DEFINER_BASELINE_2026-06-28.md'
      - '.github/workflows/supabase-security-definer-baseline-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/SUPABASE_SECURITY_DEFINER_BASELINE_2026-06-28.md'
      - '.github/workflows/supabase-security-definer-baseline-check.yml'
  workflow_dispatch:

jobs:
  validate-security-definer-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate baseline snapshot markers
        shell: bash
        run: |
          set -euo pipefail
          doc='docs/SUPABASE_SECURITY_DEFINER_BASELINE_2026-06-28.md'
          test -f "$doc"
          grep -Fq 'ofewxuqfjhamgerwzull' "$doc"
          grep -Fq 'read-only snapshot' "$doc"
          grep -Fq 'security_definer_public' "$doc"
          grep -Fq 'executable_by_authenticated' "$doc"
          grep -Fq 'not_executable_by_authenticated' "$doc"
          grep -Fq '| `security_definer_public` | 71 |' "$doc"
          grep -Fq '| `executable_by_authenticated` | 47 |' "$doc"
          grep -Fq '| `not_executable_by_authenticated` | 24 |' "$doc"
          grep -Fq 'drift to `71 / 47 / 24`' "$doc"
          grep -Fq 'This repository update records the drift; it did not create it.' "$doc"
          grep -Fq '| `leader` | 8 | 0 | 8 |' "$doc"
          grep -Fq '| `nav` | 11 | 5 | 6 |' "$doc"
          grep -Fq '| `nav_v2` | 51 | 42 | 9 |' "$doc"
          grep -Fq '| `other` | 1 | 0 | 1 |' "$doc"
          grep -Fq 'not a fixed finding' "$doc"
          grep -Fq 'The `leader` scope remains at `8 / 0 / 8`' "$doc"
          grep -Fq 'RA Lider CRM hardening remains scoped to `leader_*` objects' "$doc"
          grep -Fq 'ACTIVE_HEALTHY' "$doc"
          grep -Fq 'db.ofewxuqfjhamgerwzull.supabase.co' "$doc"
          grep -Fq 'leader-public-lead v9' "$doc"
          grep -Fq 'leader-crm-leads v12' "$doc"
          grep -Fq 'leader-crm-orders v2' "$doc"
          grep -Fq 'nav-v2-deal-api v2' "$doc"
          grep -Fq 'No Supabase production objects were changed' "$doc"
          grep -Fq 'no DDL' "$doc"
          grep -Fq 'no Edge Function deploy' "$doc"
