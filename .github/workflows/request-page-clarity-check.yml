name: Request page clarity check

on:
  push:
    branches: [main, request-page-clarity-20260628]
    paths:
      - request.html
      - assets/public-lead-form.js
      - assets/public-lead-reference-v1.js
      - assets/og-lider-default.png
      - .github/workflows/request-page-clarity-check.yml
  pull_request:
    branches: [main]
    paths:
      - request.html
      - assets/public-lead-form.js
      - assets/public-lead-reference-v1.js
      - assets/og-lider-default.png
      - .github/workflows/request-page-clarity-check.yml

jobs:
  validate-request-page-clarity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate request page UX markers
        shell: bash
        run: |
          set -euo pipefail
          page='request.html'
          form='assets/public-lead-form.js'
          helper='assets/public-lead-reference-v1.js'

          test -f "$page"
          test -f "$form"
          test -f "$helper"
          test -f assets/og-lider-default.png

          python3 - <<'PY'
          from pathlib import Path
          page = Path('request.html').read_text(encoding='utf-8')
          required = [
              'data-request-page-version="20260628-clarity-1"',
              'Что будет дальше',
              'Перед отправкой',
              'После отправки',
              'Номер обращения',
              'leader-lead-form',
              'assets/public-lead-reference-v1.js?v=1',
              'assets/public-lead-form.js?v=4',
              'og-lider-default.png',
          ]
          missing = [marker for marker in required if marker not in page]
          if missing:
              raise SystemExit('Missing request page markers: ' + ', '.join(missing))
          PY

          grep -Fq 'leader-public-lead' "$form"
          grep -Fq 'request_id' "$form"
          grep -Fq "website:field(form,'website')" "$form"
          grep -Fq "goal('lead_sent',{service,page:location.href,request_id:responseRequestId,duplicate})" "$form"
          grep -Fq 'Номер обращения: ' "$form"
          grep -Fq 'params.request_id' "$helper"

      - name: Validate public scripts syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check assets/public-lead-form.js
          node --check assets/public-lead-reference-v1.js
