          page = Path('request.html').read_text(encoding='utf-8')
          assert 'data-request-page-version="20260628-clarity-1"' in page
          PY
          grep -Fq 'Что будет дальше' "$page"
          grep -Fq 'Перед отправкой' "$page"
          grep -Fq 'После отправки' "$page"
          grep -Fq 'Номер обращения' "$page"
          grep -Fq 'leader-lead-form' "$page"
          grep -Fq 'assets/public-lead-reference-v1.js?v=1' "$page"
          grep -Fq 'assets/public-lead-form.js?v=4' "$page"
