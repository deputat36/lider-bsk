name: Request page clarity check

on:
  push:
    branches: [main, request-page-clarity-20260628]
    paths:
      - request.html
      - assets/public-lead-form.js
      - assets/public-lead-reference-v1.js
      - assets/og-lider-default.png
      - .github/workflows/request-page-clarity-check.yml
  pull_request:
    branches: [main]
    paths:
      - request.html
      - assets/public-lead-form.js
      - assets/public-lead-reference-v1.js
      - assets/og-lider-default.png
      - .github/workflows/request-page-clarity-check.yml

jobs:
  validate-request-page-clarity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate request page UX markers
        shell: bash
        run: |
          set -euo pipefail
          page='request.html'
          form='assets/public-lead-form.js'
          helper='assets/public-lead-reference-v1.js'

          test -f "$page"
          test -f "$form"
          test -f "$helper"
          test -f assets/og-lider-default.png

          grep -Fq 'data-request-page-version="20260628-clarity-1"' "$page" && {
            echo 'Unexpected escaped marker matched; check workflow quoting.' >&2
            exit 1
          } || true
          grep -Fq 'data-request-page-version="20260628-clarity-1"' "$page" && exit 1 || true
          grep -Fq 'data-request-page-version="20260628-clarity-1"' "$page" && exit 1 || true
