name: Navigator v2 check

on:
  push:
    branches: [main]
    paths:
      - 'deal-card-v2.html'
      - 'deals-v2.html'
      - 'assets/css/nav-v2.css'
      - 'assets/js/nav-v2/**'
      - '.github/workflows/navigator-v2-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deal-card-v2.html'
      - 'deals-v2.html'
      - 'assets/css/nav-v2.css'
      - 'assets/js/nav-v2/**'
      - '.github/workflows/navigator-v2-check.yml'

jobs:
  validate-navigator-v2-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Navigator v2 referenced assets
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re
          import sys
          from html.parser import HTMLParser
          from urllib.parse import urlparse

          root = pathlib.Path('.').resolve()
          missing = []

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == 'script' and values.get('src'):
                      self.refs.append(values['src'])
                  if tag == 'link' and values.get('href'):
                      self.refs.append(values['href'])

          for html_path in [pathlib.Path('deal-card-v2.html'), pathlib.Path('deals-v2.html')]:
              parser = Parser()
              parser.feed(html_path.read_text(encoding='utf-8'))
              for ref in parser.refs:
                  parsed = urlparse(ref)
                  if parsed.scheme or parsed.netloc:
                      continue
                  target = (html_path.parent / parsed.path).resolve()
                  if not str(target).startswith(str(root)):
                      continue
                  if not target.is_file():
                      missing.append(f'{html_path}: missing referenced asset {parsed.path}')

          import_re = re.compile(r'''(?:import\s+(?:[^'";]+?\s+from\s+)?|export\s+[^'";]+?\s+from\s+|import\s*\()(?P<quote>['"])(?P<path>\.{1,2}/[^'"]+)(?P=quote)''')
          html_href_re = re.compile(r'''href=\\?["'](?P<path>\./[^"']+\.html)\\?["']''')
          for js_path in pathlib.Path('assets/js/nav-v2').glob('*.js'):
              text = js_path.read_text(encoding='utf-8')
              for match in import_re.finditer(text):
                  raw = match.group('path')
                  parsed = urlparse(raw)
                  target = (js_path.parent / parsed.path).resolve()
                  if not str(target).startswith(str(root)):
                      missing.append(f'{js_path}: import escapes repository root: {raw}')
                  elif not target.is_file():
                      missing.append(f'{js_path}: missing module import {raw}')
              for match in html_href_re.finditer(text):
                  raw = match.group('path')
                  target = (root / raw.removeprefix('./')).resolve()
                  if not str(target).startswith(str(root)):
                      missing.append(f'{js_path}: href escapes repository root: {raw}')
                  elif not target.is_file():
                      missing.append(f'{js_path}: missing local href target {raw}')

          if missing:
              print('\n'.join(missing))
              sys.exit(1)
          PY

      - name: Validate Navigator v2 Supabase client guardrails
        shell: bash
        run: |
          set -euo pipefail
          client='assets/js/nav-v2/supabase-v2.js'
          menu='assets/js/nav-v2/role-menu-v2.js'
          deals='assets/js/nav-v2/deals-v2.js'
          card='assets/js/nav-v2/deal-card-v2.js'
          test -f "$client"
          test -f "$menu"
          test -f "$deals"
          test -f "$card"
          grep -Fq "sb_publishable_" "$client"
          grep -Fq "leader_crm_v4_main_session" "$client"
          grep -Fq "export async function rpc" "$client"
          grep -Fq "export async function edgeFunction" "$client"
          grep -Fq "dealApiEdgeFlagKey" "$client"
          grep -Fq "leader_nav_v2_use_deal_api_edge" "$client"
          grep -Fq "edge_api" "$client"
          grep -Fq "nav-v2-deal-api" "$client"
          grep -Fq "get_deal_card" "$client"
          grep -Fq "nav_v2_get_deal_card" "$client"
          grep -Fq "/functions/v1/" "$client"
          grep -Fq "Authorization" "$client"
          grep -Fq "apikey" "$client"
          grep -Fq "export function renderAuthBox" "$client"
          grep -Fq "export function statusText" "$client"
          grep -Fq "?id=..." "$deals"
          grep -Fq "query.get('id') || query.get('deal_id')" "$card"
          grep -Fq "Не указан id или deal_id сделки" "$card"
          node --check "$client"
          node --check "$deals"
          node --check "$card"
          if grep -R -nE 'SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY|sb_secret_' assets/js/nav-v2; then
            echo 'Navigator v2 browser assets must not expose service role secrets.' >&2
            exit 1
          fi
          if grep -R -nE 'eyJ[a-zA-Z0-9_-]{20,}' assets/js/nav-v2; then
            echo 'Navigator v2 browser assets must not contain literal JWTs.' >&2
            exit 1
          fi

      - name: Validate Navigator v2 Edge opt-in behavior
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re

          client = pathlib.Path('assets/js/nav-v2/supabase-v2.js').read_text(encoding='utf-8')
          should_use = re.search(r'function shouldUseDealApiEdge\(\) \{(?P<body>.*?)\n\}', client, re.S)
          assert should_use, 'missing shouldUseDealApiEdge()'
          body = should_use.group('body')

          required_body_markers = [
              "const params = new URLSearchParams(window.location.search);",
              "if (params.get('edge_api') === '1') return true;",
              "if (params.get('edge_api') === '0') return false;",
              "window.localStorage.getItem(NAV_V2_CONFIG.dealApiEdgeFlagKey) === '1'",
              'return false;',
          ]
          for marker in required_body_markers:
              assert marker in body, f'missing opt-in marker: {marker}'

          edge_route = "name === 'nav_v2_get_deal_card' && params?.p_deal_id && shouldUseDealApiEdge()"
          assert edge_route in client, 'get_deal_card Edge route must stay behind shouldUseDealApiEdge()'
          assert client.count("edgeFunction('nav-v2-deal-api'") == 1, 'only one browser Edge Function route is allowed in this phase'
          assert "{ action: 'get_deal_card', deal_id: params.p_deal_id }" in client, 'Edge route must send only get_deal_card payload'
          assert 'return assertDealApiResponse(json);' in client, 'Edge response must be shape-checked before returning data'
          assert 'const request = supabase.rpc(name, params);' in client, 'direct RPC fallback must remain present'

          disallowed_edge_writes = [
              'nav_v2_add_comment',
              'nav_v2_update_deal_status',
              'nav_v2_update_document_status',
              'nav_v2_update_task_status',
              "action: 'add_comment'",
              "action: 'update_deal_status'",
              "action: 'update_document_status'",
              "action: 'update_task_status'",
          ]
          for marker in disallowed_edge_writes:
              assert marker not in client, f'write action must not be routed through Edge yet: {marker}'
          PY
