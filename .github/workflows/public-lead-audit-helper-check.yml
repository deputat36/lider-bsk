name: Public lead audit helper check

on:
  push:
    branches: [main, improve-site-crm]
  pull_request:
    branches: [main]

jobs:
  validate-public-lead-audit-helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate audit helper and request trace widget
        shell: bash
        run: |
          set -euo pipefail
          loader='crm/v4/assets/v4/site-cache-note-v1.js'
          helper='crm/v4/assets/v4/public-lead-audit-helper-v1.js'
          test -f "$helper"
          grep -Fq 'public-lead-audit-helper-v1.js?v=20260625-trace-widget-1' "$loader"
          grep -Fq 'https://www.lider-bsk.ru/request.html' "$helper"
          grep -Fq 'Тест CRM v4 audit v8' "$helper"
          grep -Fq 'docs/CRM_V4_AUDIT_V8_CHECK.md' "$helper"
          grep -Fq 'publicLeadAuditHelperV1' "$helper"
          grep -Fq 'publicLeadTraceFormV1' "$helper"
          grep -Fq 'Проверить request_id' "$helper"
          grep -Fq "from('leader_request_trace')" "$helper"
          grep -Fq 'trace_status' "$helper"
          grep -Fq 'lead_without_audit' "$helper"
          grep -Fq 'audit_without_lead' "$helper"
