name: Order card design check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-order-card-design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate order design section markers
        shell: bash
        run: |
          set -euo pipefail
          card='crm/v4/assets/v4/order-card-v1.js'
          fast='crm/v4/assets/v4/orders-fast-loader-v1.js'
          production='crm/v4/assets/v4/production-board-v3.js'
          control='crm/v4/assets/v4/order-control-v2.js'
          test -f "$card"
          test -f "$fast"
          test -f "$production"
          test -f "$control"
          grep -Fq 'Дизайн в заказе' "$card"
          grep -Fq 'Дизайн / макет' "$card"
          grep -Fq 'data-order-design-section' "$card"
          grep -Fq 'layout_status' "$card"
          grep -Fq 'Перед запуском в производство проверьте, утверждён ли макет' "$card"
          grep -Fq 'designValue' "$card"
          grep -Fq 'renderDesign(order)' "$card"
          grep -Fq 'data-orders-fast-design' "$fast"
          grep -Fq 'data-orders-fast-design-summary' "$fast"
          grep -Fq 'renderDesignBadge(order)' "$fast"
          grep -Fq 'designNeedsCheck' "$fast"
          grep -Fq 'проверьте до производства' "$fast"
          grep -Fq 'Дизайн проверить' "$fast"
          grep -Fq 'Дизайн / макет' "$fast"
          grep -Fq 'data-production-layout-warning' "$production"
          grep -Fq 'Макет не согласован' "$production"
          grep -Fq 'Макет проверить' "$production"
          grep -Fq 'hasLayoutWarning' "$production"
          grep -Fq 'data-order-control-design' "$control"
          grep -Fq 'Дизайн проверить' "$control"
          grep -Fq 'Дизайн / макеты и производство' "$control"
          grep -Fq 'designNeedsCheck' "$control"
