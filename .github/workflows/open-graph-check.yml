name: Open Graph check

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'request.html'
      - 'privacy.html'
      - 'tablichki-borisoglebsk.html'
      - 'oformlenie-vitrin-borisoglebsk.html'
      - 'pechat-na-plenke-borisoglebsk.html'
      - 'srochnaya-reklama-borisoglebsk.html'
      - 'reklama-v-socsetyah-borisoglebsk.html'
      - 'reklama-dlya-meropriyatiy-borisoglebsk.html'
      - 'reklama-dlya-salona-krasoty-borisoglebsk.html'
      - 'reklama-dlya-servisa-masterskoy-borisoglebsk.html'
      - 'sitemap.xml'
      - 'assets/og-lider-default.svg'
      - 'assets/og-lider-default.png'
      - 'tools/apply_open_graph.py'
      - 'tools/open_graph_pages.json'
      - 'docs/OPEN_GRAPH.md'
      - '.github/workflows/open-graph-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'request.html'
      - 'privacy.html'
      - 'tablichki-borisoglebsk.html'
      - 'oformlenie-vitrin-borisoglebsk.html'
      - 'pechat-na-plenke-borisoglebsk.html'
      - 'srochnaya-reklama-borisoglebsk.html'
      - 'reklama-v-socsetyah-borisoglebsk.html'
      - 'reklama-dlya-meropriyatiy-borisoglebsk.html'
      - 'reklama-dlya-salona-krasoty-borisoglebsk.html'
      - 'reklama-dlya-servisa-masterskoy-borisoglebsk.html'
      - 'sitemap.xml'
      - 'assets/og-lider-default.svg'
      - 'assets/og-lider-default.png'
      - 'tools/apply_open_graph.py'
      - 'tools/open_graph_pages.json'
      - 'docs/OPEN_GRAPH.md'
      - '.github/workflows/open-graph-check.yml'

jobs:
  validate-open-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Open Graph assets and tags
        shell: bash
        run: |
          set -euo pipefail
          test -f assets/og-lider-default.svg
          test -f assets/og-lider-default.png
          grep -Fq '<svg' assets/og-lider-default.svg
          grep -Fq 'width="1200" height="630"' assets/og-lider-default.svg
          grep -Fq 'РА Лидер' assets/og-lider-default.svg
          python3 - <<'PY'
          from pathlib import Path
          data = Path('assets/og-lider-default.png').read_bytes()
          assert data.startswith(b'\x89PNG\r\n\x1a\n'), 'og-lider-default.png is not a PNG file'
          assert len(data) > 1000, 'og-lider-default.png is unexpectedly small'
          PY

          home='index.html'
          grep -Fq '<link rel="canonical" href="https://www.lider-bsk.ru/">' "$home"
          grep -Fq '<meta property="og:type" content="website">' "$home"
          grep -Fq '<meta property="og:locale" content="ru_RU">' "$home"
          grep -Fq '<meta property="og:site_name" content="РА Лидер">' "$home"
          grep -Fq '<meta property="og:url" content="https://www.lider-bsk.ru/">' "$home"
          grep -Fq '<meta property="og:title" content="РА Лидер — реклама и оформление бизнеса в Борисоглебске">' "$home"
          grep -Fq '<meta property="og:image" content="https://www.lider-bsk.ru/assets/og-lider-default.png">' "$home"
          grep -Fq '<meta property="og:image:type" content="image/png">' "$home"
          grep -Fq '<meta property="og:image:width" content="1200">' "$home"
          grep -Fq '<meta property="og:image:height" content="630">' "$home"
          grep -Fq '<meta name="twitter:card" content="summary_large_image">' "$home"
          grep -Fq '<meta name="twitter:image" content="https://www.lider-bsk.ru/assets/og-lider-default.png">' "$home"

          request='request.html'
          grep -Fq '<link rel="canonical" href="https://www.lider-bsk.ru/request.html">' "$request"
          grep -Fq '<meta property="og:type" content="website">' "$request"
          grep -Fq '<meta property="og:locale" content="ru_RU">' "$request"
          grep -Fq '<meta property="og:site_name" content="РА Лидер">' "$request"
          grep -Fq '<meta property="og:url" content="https://www.lider-bsk.ru/request.html">' "$request"
          grep -Fq '<meta property="og:title" content="Оставить заявку — РА Лидер">' "$request"
          grep -Fq '<meta property="og:image" content="https://www.lider-bsk.ru/assets/og-lider-default.png">' "$request"
          grep -Fq '<meta property="og:image:type" content="image/png">' "$request"
          grep -Fq '<meta property="og:image:width" content="1200">' "$request"
          grep -Fq '<meta property="og:image:height" content="630">' "$request"
          grep -Fq '<meta name="twitter:card" content="summary_large_image">' "$request"
          grep -Fq '<meta name="twitter:image" content="https://www.lider-bsk.ru/assets/og-lider-default.png">' "$request"

          privacy='privacy.html'
          grep -Fq '<meta name="description"' "$privacy"
          grep -Fq '<link rel="canonical" href="https://www.lider-bsk.ru/privacy.html">' "$privacy"
          grep -Fq '<meta property="og:image" content="https://www.lider-bsk.ru/assets/og-lider-default.png">' "$privacy"
          grep -Fq '<meta property="og:image:type" content="image/png">' "$privacy"
          grep -Fq '<meta name="twitter:card" content="summary_large_image">' "$privacy"

          grep -Fq '<lastmod>2026-06-26</lastmod>' sitemap.xml
          grep -Fq 'https://www.lider-bsk.ru/' sitemap.xml
          grep -Fq 'https://www.lider-bsk.ru/privacy.html' sitemap.xml

      - name: Validate configured Open Graph pages
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_open_graph.py --check

      - name: Validate sitemap XML
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse('sitemap.xml').getroot()
          urls = root.findall('.//{*}url')
          assert urls, 'sitemap has no urls'
          for item in urls:
              loc = item.find('{*}loc')
              lastmod = item.find('{*}lastmod')
              assert loc is not None and loc.text, 'url without loc'
              assert lastmod is not None and lastmod.text, f'url without lastmod: {loc.text}'
          PY