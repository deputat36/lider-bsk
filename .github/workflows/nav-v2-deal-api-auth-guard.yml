name: Navigator v2 deal API auth guard

on:
  workflow_dispatch:
    inputs:
      deal_id:
        description: 'Deal UUID used only as request payload for unauthenticated rejection check'
        required: false
        default: '00000000-0000-0000-0000-000000000000'
        type: string
      read_action:
        description: 'Read action to auth-guard-test'
        required: false
        default: 'get_deal_card'
        type: choice
        options:
          - get_deal_card
          - get_deal_card_lite
      supabase_url:
        description: 'Supabase project URL'
        required: false
        default: 'https://ofewxuqfjhamgerwzull.supabase.co'
        type: string

permissions:
  contents: read

jobs:
  verify-auth-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate auth guard script
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/nav_v2_deal_api_auth_guard_test.mjs

      - name: Validate read action input
        shell: bash
        env:
          NAV_V2_ACTION: ${{ inputs.read_action }}
        run: |
          set -euo pipefail
          if [ "${NAV_V2_ACTION}" != 'get_deal_card' ] && [ "${NAV_V2_ACTION}" != 'get_deal_card_lite' ]; then
            echo 'workflow_dispatch input read_action must be get_deal_card or get_deal_card_lite.' >&2
            exit 1
          fi
          echo 'Read action input is supported.'

      - name: Verify unauthenticated requests are rejected
        shell: bash
        env:
          NAV_V2_DEAL_ID: ${{ inputs.deal_id }}
          NAV_V2_ACTION: ${{ inputs.read_action }}
          NAV_V2_SUPABASE_URL: ${{ inputs.supabase_url }}
        run: |
          set -euo pipefail
          result="$(node tools/nav_v2_deal_api_auth_guard_test.mjs)"
          echo "$result"
          {
            echo '### Navigator v2 deal API auth guard'
            echo ''
            echo "Unauthenticated ${NAV_V2_ACTION} request was rejected as expected."
            echo ''
            echo '```json'
            echo "$result"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
