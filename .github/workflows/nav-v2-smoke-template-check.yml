name: Navigator v2 smoke template check

on:
  push:
    branches: [main]
    paths:
      - '.github/ISSUE_TEMPLATE/nav-v2-deal-api-smoke.md'
      - '.github/workflows/nav-v2-smoke-template-check.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/ISSUE_TEMPLATE/nav-v2-deal-api-smoke.md'
      - '.github/workflows/nav-v2-smoke-template-check.yml'
  workflow_dispatch:

jobs:
  validate-nav-v2-smoke-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Navigator v2 smoke issue template
        shell: bash
        run: |
          set -euo pipefail
          template='.github/ISSUE_TEMPLATE/nav-v2-deal-api-smoke.md'
          test -f "$template"
          grep -Fq 'Navigator v2 deal API runtime smoke' "$template"
          grep -Fq 'nav-v2-deal-api' "$template"
          grep -Fq 'ofewxuqfjhamgerwzull' "$template"
          grep -Fq 'Observed Edge Function version: 2' "$template"
          grep -Fq '3f438c82f2dbffdf03fbfb745369367507b9f61ddaa62b6b3d2d229d937ec455' "$template"
          grep -Fq 'GitHub Actions workflow run URL' "$template"
          grep -Fq 'Test-only data' "$template"
          grep -Fq 'preflight_only' "$template"
          grep -Fq 'compare_direct_rpc' "$template"
          grep -Fq 'preflight_only=false' "$template"
          grep -Fq 'JWT role=authenticated validation' "$template"
          grep -Fq 'JWT issuer validation' "$template"
          grep -Fq 'JWT audience validation' "$template"
          grep -Fq 'API key guardrail' "$template"
          grep -Fq 'No Authorization rejected with 401/403' "$template"
          grep -Fq 'Invalid Bearer rejected with 401/403' "$template"
          grep -Fq 'Authenticated read actions' "$template"
          grep -Fq 'get_deal_card Edge Function call completed' "$template"
          grep -Fq 'get_deal_card_lite Edge Function call completed' "$template"
          grep -Fq 'get_deal_card_lite returned data field present' "$template"
          grep -Fq 'V2 write action smoke' "$template"
          grep -Fq 'add_comment with test-only body' "$template"
          grep -Fq 'update_deal_status with reversible test status' "$template"
          grep -Fq 'update_document_status with test document' "$template"
          grep -Fq 'update_document_workflow with test document' "$template"
          grep -Fq 'update_task_status with test task' "$template"
          grep -Fq 'Write cleanup completed' "$template"
          grep -Fq 'Allowed owner' "$template"
          grep -Fq 'Allowed admin' "$template"
          grep -Fq 'Allowed manager' "$template"
          grep -Fq 'Allowed spn' "$template"
          grep -Fq 'Allowed lawyer' "$template"
          grep -Fq 'Allowed broker' "$template"
          grep -Fq 'Unrelated authenticated user denied' "$template"
          grep -Fq 'Disabled profile denied' "$template"
          grep -Fq 'nav_v2_get_deal_card direct RPC call completed' "$template"
          grep -Fq 'nav_v2_get_deal_card_lite direct RPC call completed' "$template"
          grep -Fq 'Write direct RPC comparison used' "$template"
          grep -Fq 'Browser URL tested with ?edge_api=1' "$template"
          grep -Fq '?deal_id=<deal-uuid> tested' "$template"
          grep -Fq 'Browser write actions remained on direct RPC paths' "$template"
          grep -Fq 'Can consider default browser read migration' "$template"
          grep -Fq 'Can consider browser write migration' "$template"
          grep -Fq 'Не вставлять' "$template"
          grep -Fq 'JWT, refresh token, service-role key, secret API key' "$template"
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}|sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$template"; then
            echo 'Navigator v2 smoke issue template must not contain literal JWTs or secret key markers.' >&2
            exit 1
          fi
