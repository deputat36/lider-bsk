name: Apply public form cache version

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-public-form-cache-version.yml

permissions:
  contents: write

jobs:
  update-cache-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update public form cache version on all pages
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changed = []
          old = 'assets/public-lead-form.js?v=3'
          new = 'assets/public-lead-form.js?v=4'

          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  continue
              path.write_text(text.replace(old, new), encoding='utf-8')
              changed.append(path.as_posix())

          if not changed:
              raise SystemExit('No public pages referenced the expected v=3 form asset')

          print(f'Updated {len(changed)} public pages')
          PY

          if grep -lF 'assets/public-lead-form.js?v=3' -- *.html; then
            echo 'Old public form cache version remains.' >&2
            exit 1
          fi
          grep -lF 'assets/public-lead-form.js?v=4' -- *.html >/dev/null

      - name: Commit cache version update and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-public-form-cache-version.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- '*.html' .github/workflows/apply-public-form-cache-version.yml
          git commit -m 'Refresh public lead form cache version'
          git push origin HEAD:main
