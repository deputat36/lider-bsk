name: Codex operating docs check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-codex-operating-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Codex owner playbook and autopilot rules
        shell: bash
        run: |
          set -euo pipefail
          playbook='docs/CODEX_OWNER_PLAYBOOK.md'
          rules='docs/AUTOPILOT_RULES.md'
          status='docs/STATUS.md'
          operating_status='docs/CODEX_OPERATING_STATUS_2026-06-27.md'
          current_checkpoint='docs/CODEX_OPERATING_STATUS_2026-06-28.md'
          supabase_baseline='docs/SUPABASE_RA_LIDER_BASELINE_2026-06-28.md'
          owner_decisions='docs/OWNER_DECISIONS_2026-06-28.md'
          test -f "$playbook"
          test -f "$rules"
          test -f "$status"
          test -f "$operating_status"
          test -f "$current_checkpoint"
          test -f "$supabase_baseline"
          test -f "$owner_decisions"
          grep -Fq 'Date: 2026-06-28.' "$playbook"
          grep -Fq 'Supabase только read-only' "$playbook"
          grep -Fq 'Supabase production changes require explicit owner approval' "$playbook"
          grep -Fq 'Owner decisions and approval boundaries are tracked in `docs/OWNER_DECISIONS_2026-06-28.md`' "$playbook"
          grep -Fq 'Do not assert CI green' "$playbook"
          grep -Fq 'GitHub repo: `deputat36/lider-bsk`' "$playbook"
          grep -Fq 'Supabase project: `ofewxuqfjhamgerwzull`' "$playbook"
          grep -Fq 'Status issue: #15' "$playbook"
          grep -Fq 'Owner decisions: `docs/OWNER_DECISIONS_2026-06-28.md`' "$playbook"
          grep -Fq 'Access tab runbook: `docs/CRM_ACCESS_TAB_CHECK_2026-06-27.md`' "$playbook"
          grep -Fq 'Дата: 2026-06-28.' "$rules"
          grep -Fq 'docs/CODEX_OWNER_PLAYBOOK.md' "$rules"
          grep -Fq 'docs/OWNER_DECISIONS_2026-06-28.md' "$rules"
          grep -Fq 'Supabase только read-only' "$rules"
          grep -Fq 'production DDL/DML в Supabase запрещён без явного разрешения' "$rules"
          grep -Fq 'owner decisions из `docs/OWNER_DECISIONS_2026-06-28.md` являются текущими границами автономной работы' "$rules"
          grep -Fq 'CI green не утверждать' "$rules"
          grep -Fq 'issue #15' "$rules"
          grep -Fq 'leader_*' "$rules"
          grep -Fq 'nav_*' "$rules"
          grep -Fq 'leaked password protection' "$rules"
          grep -Fq 'owner/admin создаёт invite' "$rules"
          grep -Fq 'пользователь без invite остаётся pending/inactive' "$rules"
          grep -Fq 'unused-index notices не исправлять удалением индексов без approval' "$rules"
          grep -Fq 'Дата обновления: 2026-06-28.' "$status"
          grep -Fq 'docs/AUTOPILOT_RULES.md' "$status"
          grep -Fq 'docs/CODEX_OPERATING_STATUS_2026-06-28.md' "$status"
          grep -Fq 'docs/SUPABASE_RA_LIDER_BASELINE_2026-06-28.md' "$status"
          grep -Fq 'Проверка 2026-06-28' "$status"
          grep -Fq 'Supabase production не менялся' "$status"
          grep -Fq 'PR #13 is closed without merge' "$operating_status"
          grep -Fq 'crm-hardening-main-20260626' "$operating_status"
          grep -Fq 'current source of truth for CRM access docs and guards is `main`' "$operating_status"
          grep -Fq 'Supabase только read-only' "$operating_status"
          grep -Fq 'leader-public-lead v9' "$operating_status"
          grep -Fq 'leader-crm-leads v12' "$operating_status"
          grep -Fq 'leader-crm-orders v2' "$operating_status"
          grep -Fq 'owner/admin creates invite' "$operating_status"
          grep -Fq 'user without invite remains pending/inactive' "$operating_status"
          grep -Fq 'Codex operating status — 2026-06-28' "$current_checkpoint"
          grep -Fq 'Open PRs: none' "$current_checkpoint"
          grep -Fq 'active source of truth is `main`' "$current_checkpoint"
          grep -Fq 'Supabase только read-only' "$current_checkpoint"
          grep -Fq 'Supabase baseline: `docs/SUPABASE_RA_LIDER_BASELINE_2026-06-28.md`' "$current_checkpoint"
          grep -Fq 'RA Lider Supabase production baseline is documented in `docs/SUPABASE_RA_LIDER_BASELINE_2026-06-28.md`' "$current_checkpoint"
          grep -Fq 'leader-public-lead` must remain ACTIVE v9' "$current_checkpoint"
          grep -Fq 'leader-crm-leads` must remain ACTIVE v12' "$current_checkpoint"
          grep -Fq 'leader-crm-orders` must remain ACTIVE v2' "$current_checkpoint"
          grep -Fq 'SECURITY DEFINER execute count should remain `0`' "$current_checkpoint"
          grep -Fq 'Supabase RA Lider baseline — 2026-06-28' "$supabase_baseline"
          grep -Fq '`leader-public-lead`: `ACTIVE`, version `9`, `verify_jwt=false`' "$supabase_baseline"
          grep -Fq '`leader-crm-leads`: `ACTIVE`, version `12`, `verify_jwt=true`' "$supabase_baseline"
          grep -Fq '`leader-crm-orders`: `ACTIVE`, version `2`, `verify_jwt=true`' "$supabase_baseline"
          grep -Fq 'Owner decisions — 2026-06-28' "$owner_decisions"
          grep -Fq 'Without this wording, Codex should treat Supabase as read-only' "$owner_decisions"
