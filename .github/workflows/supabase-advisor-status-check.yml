name: Supabase advisor status check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-supabase-advisor-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate RA Lider Supabase advisor status snapshot
        shell: bash
        run: |
          set -euo pipefail
          doc='docs/SUPABASE_ADVISOR_STATUS_2026-06-27.md'
          test -f "$doc"
          grep -Fq 'ofewxuqfjhamgerwzull' "$doc"
          grep -Fq 'leader-public-lead v9' "$doc"
          grep -Fq 'leader-crm-leads v12' "$doc"
          grep -Fq 'leader-crm-orders v2' "$doc"
          grep -Fq 'verify_jwt=false' "$doc"
          grep -Fq 'verify_jwt=true' "$doc"
          grep -Fq 'public.leader_%' "$doc"
          grep -Fq 'SECURITY DEFINER' "$doc"
          grep -Fq 'There were no callable `public.leader_%` SECURITY DEFINER functions' "$doc"
          grep -Fq 'leader_user_invites' "$doc"
          grep -Fq 'leader_user_profiles' "$doc"
          grep -Fq 'authenticated:SELECT' "$doc"
          grep -Fq 'authenticated:INSERT' "$doc"
          grep -Fq 'authenticated:UPDATE' "$doc"
          grep -Fq 'No `anon` grants were present' "$doc"
          grep -Fq '`owner` | 2' "$doc"
          grep -Fq '`admin` | 1' "$doc"
          grep -Fq '`manager` | 1' "$doc"
          grep -Fq 'nav_*' "$doc"
          grep -Fq 'leaked password protection' "$doc"
          grep -Fq 'No Supabase production objects were changed' "$doc"
