name: Public lead audit copy check

on:
  push:
    branches: [main, improve-site-crm]
  pull_request:
    branches: [main]

jobs:
  validate-public-lead-audit-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate duplicate and request id copy UI
        shell: bash
        run: |
          set -euo pipefail
          loader='crm/v4/assets/v4/site-cache-note-v1.js'
          audit='crm/v4/assets/v4/public-lead-audit-v1.js'
          grep -Fq 'public-lead-audit-v1.js?v=20260625-duplicate-copy-1' "$loader"
          grep -Fq 'data-public-lead-audit-copy' "$audit"
          grep -Fq 'Скопировать request_id' "$audit"
          grep -Fq 'request_id скопирован' "$audit"
          grep -Fq "data-public-lead-audit-filter=\"duplicate\"" "$audit"
          grep -Fq "counts.duplicate" "$audit"
