name: Navigator v2 deal API check

on:
  push:
    branches: [main, nav-v2-deal-api-get-card-bridge-20260626, nav-v2-deal-api-smoke-test-20260626, nav-v2-deal-api-smoke-workflow-20260627, nav-v2-deal-api-auth-guard-20260627, nav-v2-deal-api-auth-guard-workflow-20260627, nav-v2-deal-api-step-summary-20260627, nav-v2-deal-api-invalid-token-guard-20260627, nav-v2-deal-api-smoke-input-guard-20260627, nav-v2-deal-api-smoke-url-guard-20260627, nav-v2-smoke-api-key-guard-20260627, nav-v2-smoke-jwt-guard-20260627, nav-v2-smoke-jwt-exp-guard-20260627, nav-v2-smoke-jwt-issuer-guard-20260627, nav-v2-smoke-jwt-audience-guard-20260627]
    paths:
      - 'supabase/config.toml'
      - 'supabase/functions/nav-v2-deal-api/**'
      - 'tools/nav_v2_deal_api_smoke_test.mjs'
      - 'tools/nav_v2_deal_api_auth_guard_test.mjs'
      - '.github/workflows/nav-v2-deal-api-check.yml'
      - '.github/workflows/nav-v2-deal-api-smoke.yml'
      - '.github/workflows/nav-v2-deal-api-auth-guard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/functions/nav-v2-deal-api/**'
      - 'tools/nav_v2_deal_api_smoke_test.mjs'
      - 'tools/nav_v2_deal_api_auth_guard_test.mjs'
      - '.github/workflows/nav-v2-deal-api-check.yml'
      - '.github/workflows/nav-v2-deal-api-smoke.yml'
      - '.github/workflows/nav-v2-deal-api-auth-guard.yml'

jobs:
  validate-nav-v2-deal-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate function bridge
        shell: bash
        run: |
          set -euo pipefail
          fn='supabase/functions/nav-v2-deal-api/index.ts'
          config='supabase/config.toml'
          test -f "$fn"
          test -f "$config"
          grep -Fq '[functions.nav-v2-deal-api]' "$config"
          grep -Fq 'verify_jwt = true' "$config"
          grep -Fq 'Deno.serve' "$fn"
          grep -Fq 'getAuthUser' "$fn"
          grep -Fq '/auth/v1/user' "$fn"
          grep -Fq 'SUPABASE_URL' "$fn"
          grep -Fq 'SUPABASE_ANON_KEY' "$fn"
          grep -Fq 'callUserRpc' "$fn"
          grep -Fq '/rest/v1/rpc/' "$fn"
          grep -Fq 'nav_v2_get_deal_card' "$fn"
          grep -Fq 'parseDealId' "$fn"
          grep -Fq 'uuidRe' "$fn"
          grep -Fq 'get_deal_card' "$fn"
          grep -Fq 'add_comment' "$fn"
          grep -Fq 'update_deal_status' "$fn"
          grep -Fq 'update_document_status' "$fn"
          grep -Fq 'update_task_status' "$fn"
          grep -Fq '501' "$fn"
          if grep -R -nE 'sb_secret_|eyJ[a-zA-Z0-9_-]{20,}' supabase/functions/nav-v2-deal-api; then
            echo 'Function source must not contain literal Supabase secret keys or JWTs.' >&2
            exit 1
          fi

      - name: Validate action boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          text = Path('supabase/functions/nav-v2-deal-api/index.ts').read_text(encoding='utf-8')
          required = {
              'get_deal_card',
              'add_comment',
              'update_deal_status',
              'update_document_status',
              'update_task_status',
          }
          missing = [item for item in sorted(required) if text.count(f'"{item}"') < 2]
          assert not missing, f'missing actions in type or whitelist: {missing}'
          assert 'SUPABASE_SERVICE_ROLE_KEY' not in text, 'bridge must not use service-role before explicit authorization implementation'
          assert 'supabase.rpc(' not in text, 'bridge must not proxy arbitrary supabase-js RPC calls'
          assert text.count('nav_v2_get_deal_card') == 1, 'only get_deal_card may bridge to an existing RPC in this phase'
          assert 'nav_v2_add_comment' not in text
          assert 'nav_v2_update_deal_status' not in text
          assert 'nav_v2_update_document_status' not in text
          assert 'nav_v2_update_task_status' not in text
          PY

      - name: Validate smoke test tooling
        shell: bash
        run: |
          set -euo pipefail
          smoke='tools/nav_v2_deal_api_smoke_test.mjs'
          auth_guard='tools/nav_v2_deal_api_auth_guard_test.mjs'
          test -f "$smoke"
          test -f "$auth_guard"
          grep -Fq 'NAV_V2_JWT' "$smoke"
          grep -Fq 'NAV_V2_DEAL_ID' "$smoke"
          grep -Fq 'NAV_V2_API_KEY' "$smoke"
          grep -Fq 'NAV_V2_COMPARE_DIRECT_RPC' "$smoke"
          grep -Fq 'decodeJwtPayloadMaybe' "$smoke"
          grep -Fq 'expectedJwtIssuer' "$smoke"
          grep -Fq "replace(/\\/+$/, '')" "$smoke"
          grep -Fq 'return `${baseUrl}/auth/v1`;' "$smoke"
          grep -Fq 'NAV_V2_JWT issuer must match NAV_V2_SUPABASE_URL' "$smoke"
          grep -Fq "payload.aud !== 'authenticated'" "$smoke"
          grep -Fq 'NAV_V2_JWT audience must be authenticated' "$smoke"
          grep -Fq 'assertUserAccessJwt' "$smoke"
          grep -Fq "payload.role !== 'authenticated'" "$smoke"
          grep -Fq 'NAV_V2_JWT must be a user access token with role=authenticated' "$smoke"
          grep -Fq 'NAV_V2_JWT must include a user subject claim' "$smoke"
          grep -Fq 'NAV_V2_JWT must include an exp claim' "$smoke"
          grep -Fq 'const expiresAt = Number(payload.exp)' "$smoke"
          grep -Fq 'Math.floor(Date.now() / 1000)' "$smoke"
          grep -Fq 'expiresAt <= now' "$smoke"
          grep -Fq 'NAV_V2_JWT must not be expired' "$smoke"
          grep -Fq 'assertApiKeyIsPublic' "$smoke"
          grep -Fq "const secretPrefix = 'sb_' + 'secret_'" "$smoke"
          grep -Fq "jwtPayload?.role === 'service_role'" "$smoke"
          grep -Fq 'NAV_V2_API_KEY must be a publishable/anon key, not a secret key' "$smoke"
          grep -Fq 'NAV_V2_API_KEY must not be a service_role JWT' "$smoke"
          grep -Fq '/functions/v1/nav-v2-deal-api' "$smoke"
          grep -Fq '/rest/v1/rpc/nav_v2_get_deal_card' "$smoke"
          grep -Fq 'assertDealCardPayload' "$smoke"
          grep -Fq 'compared_direct_rpc' "$smoke"
          grep -Fq 'missing_authorization' "$auth_guard"
          grep -Fq 'invalid_bearer_token' "$auth_guard"
          grep -Fq 'invalid-nav-v2-token' "$auth_guard"
          grep -Fq 'ALLOWED_REJECTION_STATUSES' "$auth_guard"
          grep -Fq '401' "$auth_guard"
          grep -Fq '403' "$auth_guard"
          grep -Fq '/functions/v1/nav-v2-deal-api' "$auth_guard"
          grep -Fq 'Authorization' "$smoke"
          grep -Fq 'Authorization' "$auth_guard"
          node --check "$smoke"
          node --check "$auth_guard"
          if grep -nE 'sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$smoke" "$auth_guard"; then
            echo 'Smoke tests must not contain service role or secret key markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$smoke" "$auth_guard"; then
            echo 'Smoke tests must not contain literal JWTs.' >&2
            exit 1
          fi

      - name: Validate manual smoke workflow
        shell: bash
        run: |
          set -euo pipefail
          workflow='.github/workflows/nav-v2-deal-api-smoke.yml'
          test -f "$workflow"
          grep -Fq 'workflow_dispatch' "$workflow"
          grep -Fq 'deal_id' "$workflow"
          grep -Fq 'compare_direct_rpc' "$workflow"
          grep -Fq 'supabase_url' "$workflow"
          grep -Fq 'secrets.NAV_V2_JWT' "$workflow"
          grep -Fq 'NAV_V2_DEAL_ID' "$workflow"
          grep -Fq 'NAV_V2_COMPARE_DIRECT_RPC' "$workflow"
          grep -Fq 'nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'Validate deal id input' "$workflow"
          grep -Fq 'workflow_dispatch input deal_id must be a UUID.' "$workflow"
          grep -Fq 'Deal id input has UUID format.' "$workflow"
          grep -Fq '[0-9a-fA-F]{8}' "$workflow"
          grep -Fq 'Validate Supabase URL input' "$workflow"
          grep -Fq 'NAV_V2_ALLOWED_SUPABASE_URL' "$workflow"
          grep -Fq 'https://ofewxuqfjhamgerwzull.supabase.co' "$workflow"
          grep -Fq 'workflow_dispatch input supabase_url must match the production Supabase project URL.' "$workflow"
          grep -Fq 'Supabase URL input matches the production project.' "$workflow"
          grep -Fq 'Verify unauthenticated requests are rejected' "$workflow"
          grep -Fq 'Run authenticated smoke test' "$workflow"
          grep -Fq 'GITHUB_STEP_SUMMARY' "$workflow"
          grep -Fq 'Navigator v2 deal API auth guard' "$workflow"
          grep -Fq 'Navigator v2 deal API authenticated smoke' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_smoke_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_smoke_test.mjs' "$workflow"
          if grep -nE 'sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$workflow"; then
            echo 'Manual smoke workflow must not contain service role or secret key markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$workflow"; then
            echo 'Manual smoke workflow must not contain literal JWTs.' >&2
            exit 1
          fi

      - name: Validate standalone auth guard workflow
        shell: bash
        run: |
          set -euo pipefail
          workflow='.github/workflows/nav-v2-deal-api-auth-guard.yml'
          test -f "$workflow"
          grep -Fq 'workflow_dispatch' "$workflow"
          grep -Fq 'Navigator v2 deal API auth guard' "$workflow"
          grep -Fq 'Verify unauthenticated requests are rejected' "$workflow"
          grep -Fq 'GITHUB_STEP_SUMMARY' "$workflow"
          grep -Fq 'Unauthenticated request was rejected as expected.' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'NAV_V2_DEAL_ID' "$workflow"
          grep -Fq 'NAV_V2_SUPABASE_URL' "$workflow"
          if grep -nE 'NAV_V2_JWT|secrets\.|sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$workflow"; then
            echo 'Standalone auth guard workflow must not use secrets, JWT, or service-role markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$workflow"; then
            echo 'Standalone auth guard workflow must not contain literal JWTs.' >&2
            exit 1
          fi
