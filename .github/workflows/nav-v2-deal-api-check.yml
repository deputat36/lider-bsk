name: Navigator v2 deal API check

on:
  push:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/functions/nav-v2-deal-api/**'
      - 'tools/nav_v2_deal_api_smoke_test.mjs'
      - 'tools/nav_v2_deal_api_smoke_preflight_test.mjs'
      - 'tools/nav_v2_deal_api_auth_guard_test.mjs'
      - '.github/workflows/nav-v2-deal-api-check.yml'
      - '.github/workflows/nav-v2-deal-api-smoke.yml'
      - '.github/workflows/nav-v2-deal-api-auth-guard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/functions/nav-v2-deal-api/**'
      - 'tools/nav_v2_deal_api_smoke_test.mjs'
      - 'tools/nav_v2_deal_api_smoke_preflight_test.mjs'
      - 'tools/nav_v2_deal_api_auth_guard_test.mjs'
      - '.github/workflows/nav-v2-deal-api-check.yml'
      - '.github/workflows/nav-v2-deal-api-smoke.yml'
      - '.github/workflows/nav-v2-deal-api-auth-guard.yml'
  workflow_dispatch:

jobs:
  validate-nav-v2-deal-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate function bridge
        shell: bash
        run: |
          set -euo pipefail
          fn='supabase/functions/nav-v2-deal-api/index.ts'
          config='supabase/config.toml'
          test -f "$fn"
          test -f "$config"
          grep -Fq '[functions.nav-v2-deal-api]' "$config"
          grep -Fq 'verify_jwt = true' "$config"
          grep -Fq 'Deno.serve' "$fn"
          grep -Fq 'getAuthUser' "$fn"
          grep -Fq '/auth/v1/user' "$fn"
          grep -Fq 'SUPABASE_URL' "$fn"
          grep -Fq 'SUPABASE_ANON_KEY' "$fn"
          grep -Fq 'callUserRpc' "$fn"
          grep -Fq '/rest/v1/rpc/' "$fn"
          grep -Fq 'parseUuid' "$fn"
          grep -Fq 'parseEnum' "$fn"
          grep -Fq 'parseOptionalUuid' "$fn"
          grep -Fq 'parseOptionalRole' "$fn"
          grep -Fq 'parseOptionalDate' "$fn"
          grep -Fq 'uuidRe' "$fn"
          grep -Fq 'dealStatuses' "$fn"
          grep -Fq 'documentStatuses' "$fn"
          grep -Fq 'taskStatuses' "$fn"
          grep -Fq 'commentVisibilities' "$fn"
          grep -Fq 'roles' "$fn"
          grep -Fq 'get_deal_card_lite' "$fn"
          grep -Fq 'update_document_workflow' "$fn"
          grep -Fq 'nav_v2_get_deal_card' "$fn"
          grep -Fq 'nav_v2_get_deal_card_lite' "$fn"
          grep -Fq 'nav_v2_add_comment' "$fn"
          grep -Fq 'nav_v2_update_deal_status' "$fn"
          grep -Fq 'nav_v2_update_document_status' "$fn"
          grep -Fq 'nav_v2_update_document_workflow' "$fn"
          grep -Fq 'nav_v2_update_task_status' "$fn"
          if grep -R -nE 'sb_secret_|eyJ[a-zA-Z0-9_-]{20,}' supabase/functions/nav-v2-deal-api; then
            echo 'Function source must not contain literal Supabase secret keys or JWTs.' >&2
            exit 1
          fi

      - name: Validate action boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          text = Path('supabase/functions/nav-v2-deal-api/index.ts').read_text(encoding='utf-8')
          required_actions = {
              'get_deal_card',
              'get_deal_card_lite',
              'add_comment',
              'update_deal_status',
              'update_document_status',
              'update_document_workflow',
              'update_task_status',
          }
          missing_actions = [item for item in sorted(required_actions) if text.count(f'"{item}"') < 2]
          assert not missing_actions, f'missing actions in type or whitelist: {missing_actions}'

          required_rpcs = {
              'nav_v2_get_deal_card',
              'nav_v2_get_deal_card_lite',
              'nav_v2_add_comment',
              'nav_v2_update_deal_status',
              'nav_v2_update_document_status',
              'nav_v2_update_document_workflow',
              'nav_v2_update_task_status',
          }
          missing_rpcs = [item for item in sorted(required_rpcs) if item not in text]
          assert not missing_rpcs, f'missing explicit RPC bridge: {missing_rpcs}'

          assert 'SUPABASE_SERVICE_ROLE_KEY' not in text, 'bridge must not use service-role keys'
          assert 'SERVICE_ROLE_KEY' not in text, 'bridge must not use service-role keys'
          assert 'supabase.rpc(' not in text, 'bridge must not proxy arbitrary supabase-js RPC calls'
          assert 'callUserRpc(req, rpcName' not in text, 'RPC names must stay explicit at call sites'
          assert 'allowedActions = new Set<NavV2Action>' in text, 'action allowlist must stay explicit'
          assert 'const wantsLite = action === "get_deal_card_lite" || body.lite === true;' in text
          PY

      - name: Validate smoke test tooling
        shell: bash
        run: |
          set -euo pipefail
          smoke='tools/nav_v2_deal_api_smoke_test.mjs'
          preflight='tools/nav_v2_deal_api_smoke_preflight_test.mjs'
          auth_guard='tools/nav_v2_deal_api_auth_guard_test.mjs'
          test -f "$smoke"
          test -f "$preflight"
          test -f "$auth_guard"
          grep -Fq 'NAV_V2_JWT' "$smoke"
          grep -Fq 'NAV_V2_DEAL_ID' "$smoke"
          grep -Fq 'NAV_V2_ACTION' "$smoke"
          grep -Fq 'READ_ACTIONS' "$smoke"
          grep -Fq "get_deal_card_lite" "$smoke"
          grep -Fq 'DIRECT_RPC_BY_ACTION' "$smoke"
          grep -Fq 'nav_v2_get_deal_card_lite' "$smoke"
          grep -Fq 'assertReadAction' "$smoke"
          grep -Fq 'assertActionPayload' "$smoke"
          grep -Fq 'assertObjectPayload' "$smoke"
          grep -Fq 'Lite payload must not be empty' "$smoke"
          grep -Fq 'NAV_V2_ACTION must be one of: get_deal_card, get_deal_card_lite' "$smoke"
          grep -Fq 'NAV_V2_API_KEY' "$smoke"
          grep -Fq 'NAV_V2_COMPARE_DIRECT_RPC' "$smoke"
          grep -Fq 'NAV_V2_PREFLIGHT_ONLY' "$smoke"
          grep -Fq 'preflight_only' "$smoke"
          grep -Fq 'decodeJwtPayloadMaybe' "$smoke"
          grep -Fq 'expectedJwtIssuer' "$smoke"
          grep -Fq "replace(/\\/+$/, '')" "$smoke"
          grep -Fq 'return `${baseUrl}/auth/v1`;' "$smoke"
          grep -Fq 'NAV_V2_JWT issuer must match NAV_V2_SUPABASE_URL' "$smoke"
          grep -Fq "payload.aud !== 'authenticated'" "$smoke"
          grep -Fq 'NAV_V2_JWT audience must be authenticated' "$smoke"
          grep -Fq "payload.is_anonymous === true" "$smoke"
          grep -Fq 'NAV_V2_JWT must not be an anonymous user token' "$smoke"
          grep -Fq 'assertUserAccessJwt' "$smoke"
          grep -Fq "payload.role !== 'authenticated'" "$smoke"
          grep -Fq 'NAV_V2_JWT must be a user access token with role=authenticated' "$smoke"
          grep -Fq 'NAV_V2_JWT must include a user subject claim' "$smoke"
          grep -Fq 'NAV_V2_JWT must include an exp claim' "$smoke"
          grep -Fq 'const expiresAt = Number(payload.exp)' "$smoke"
          grep -Fq 'Math.floor(Date.now() / 1000)' "$smoke"
          grep -Fq 'expiresAt <= now' "$smoke"
          grep -Fq 'NAV_V2_JWT must not be expired' "$smoke"
          grep -Fq 'assertApiKeyIsPublic' "$smoke"
          grep -Fq "const secretPrefix = 'sb_' + 'secret_'" "$smoke"
          grep -Fq "jwtPayload?.role === 'service_role'" "$smoke"
          grep -Fq 'NAV_V2_API_KEY must be a publishable/anon key, not a secret key' "$smoke"
          grep -Fq 'NAV_V2_API_KEY must not be a service_role JWT' "$smoke"
          grep -Fq 'expectPreflightSuccess' "$preflight"
          grep -Fq 'expectPreflightFailure' "$preflight"
          grep -Fq 'NAV_V2_PREFLIGHT_ONLY' "$preflight"
          grep -Fq 'NAV_V2_ACTION' "$preflight"
          grep -Fq 'valid preflight-only lite action' "$preflight"
          grep -Fq 'unsupported read action' "$preflight"
          grep -Fq 'synthetic-signature' "$preflight"
          grep -Fq 'cases: 12' "$preflight"
          grep -Fq '/functions/v1/nav-v2-deal-api' "$smoke"
          grep -Fq '/rest/v1/rpc/${rpcName}' "$smoke"
          grep -Fq 'assertDealCardPayload' "$smoke"
          grep -Fq 'compared_direct_rpc' "$smoke"
          grep -Fq 'missing_authorization' "$auth_guard"
          grep -Fq 'invalid_bearer_token' "$auth_guard"
          grep -Fq 'invalid-nav-v2-token' "$auth_guard"
          grep -Fq 'ALLOWED_REJECTION_STATUSES' "$auth_guard"
          grep -Fq 'NAV_V2_ACTION' "$auth_guard"
          grep -Fq 'READ_ACTIONS' "$auth_guard"
          grep -Fq 'assertReadAction' "$auth_guard"
          grep -Fq 'get_deal_card_lite' "$auth_guard"
          grep -Fq 'NAV_V2_ACTION must be one of: get_deal_card, get_deal_card_lite' "$auth_guard"
          grep -Fq 'return { check: testCase.name, action, status: response.status }' "$auth_guard"
          grep -Fq '401' "$auth_guard"
          grep -Fq '403' "$auth_guard"
          grep -Fq '/functions/v1/nav-v2-deal-api' "$auth_guard"
          grep -Fq 'Authorization' "$smoke"
          grep -Fq 'Authorization' "$auth_guard"
          node --check "$smoke"
          node --check "$preflight"
          node --check "$auth_guard"
          node "$preflight"
          auth_guard_error="$(mktemp)"
          if NAV_V2_SUPABASE_URL='http://127.0.0.1:9' NAV_V2_ACTION='update_deal_status' node "$auth_guard" 2>"$auth_guard_error"; then
            echo 'Auth guard must reject unsupported read actions before runtime calls.' >&2
            exit 1
          fi
          grep -Fq 'NAV_V2_ACTION must be one of: get_deal_card, get_deal_card_lite' "$auth_guard_error"
          echo 'Auth guard rejects unsupported read actions before runtime calls.'
          if grep -nE 'sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$smoke" "$preflight" "$auth_guard"; then
            echo 'Smoke tests must not contain service role or secret key markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$smoke" "$preflight" "$auth_guard"; then
            echo 'Smoke tests must not contain literal JWTs.' >&2
            exit 1
          fi

      - name: Validate manual smoke workflow
        shell: bash
        run: |
          set -euo pipefail
          workflow='.github/workflows/nav-v2-deal-api-smoke.yml'
          test -f "$workflow"
          grep -Fq 'workflow_dispatch' "$workflow"
          grep -Fq 'deal_id' "$workflow"
          grep -Fq 'read_action' "$workflow"
          grep -Fq 'Read action to smoke-test' "$workflow"
          grep -Fq 'get_deal_card_lite' "$workflow"
          grep -Fq 'compare_direct_rpc' "$workflow"
          grep -Fq 'matching direct nav_v2 read RPC' "$workflow"
          grep -Fq 'preflight_only' "$workflow"
          grep -Fq 'read action, and API key locally' "$workflow"
          grep -Fq 'supabase_url' "$workflow"
          grep -Fq 'secrets.NAV_V2_JWT' "$workflow"
          grep -Fq 'NAV_V2_DEAL_ID' "$workflow"
          grep -Fq 'NAV_V2_ACTION' "$workflow"
          grep -Fq 'NAV_V2_COMPARE_DIRECT_RPC' "$workflow"
          grep -Fq 'NAV_V2_PREFLIGHT_ONLY' "$workflow"
          grep -Fq 'INPUT_COMPARE_DIRECT_RPC' "$workflow"
          grep -Fq 'INPUT_PREFLIGHT_ONLY' "$workflow"
          grep -Fq 'Validate read action input' "$workflow"
          grep -Fq 'workflow_dispatch input read_action must be get_deal_card or get_deal_card_lite.' "$workflow"
          grep -Fq 'Read action input is supported.' "$workflow"
          grep -Fq 'Validate smoke mode inputs' "$workflow"
          grep -Fq 'workflow_dispatch inputs preflight_only and compare_direct_rpc cannot both be true because preflight-only mode does not call direct RPC.' "$workflow"
          grep -Fq 'Smoke mode inputs are compatible.' "$workflow"
          grep -Fq 'Authenticated ${NAV_V2_ACTION} smoke test completed.' "$workflow"
          grep -Fq 'Authenticated ${NAV_V2_ACTION} preflight-only validation completed without Edge Function or direct RPC calls.' "$workflow"
          grep -Fq 'if:' "$workflow"
          grep -Fq '!inputs.preflight_only' "$workflow"
          grep -Fq 'nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'Validate deal id input' "$workflow"
          grep -Fq 'workflow_dispatch input deal_id must be a UUID.' "$workflow"
          grep -Fq 'Deal id input has UUID format.' "$workflow"
          grep -Fq '[0-9a-fA-F]{8}' "$workflow"
          grep -Fq 'Validate Supabase URL input' "$workflow"
          grep -Fq 'NAV_V2_ALLOWED_SUPABASE_URL' "$workflow"
          grep -Fq 'https://ofewxuqfjhamgerwzull.supabase.co' "$workflow"
          grep -Fq 'workflow_dispatch input supabase_url must match the production Supabase project URL.' "$workflow"
          grep -Fq 'Supabase URL input matches the production project.' "$workflow"
          grep -Fq 'Verify unauthenticated requests are rejected' "$workflow"
          grep -Fq 'Run authenticated smoke test' "$workflow"
          grep -Fq 'GITHUB_STEP_SUMMARY' "$workflow"
          grep -Fq 'Navigator v2 deal API auth guard' "$workflow"
          grep -Fq 'Navigator v2 deal API authenticated smoke' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_smoke_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_smoke_test.mjs' "$workflow"
          if grep -nE 'sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$workflow"; then
            echo 'Manual smoke workflow must not contain service role or secret key markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$workflow"; then
            echo 'Manual smoke workflow must not contain literal JWTs.' >&2
            exit 1
          fi

      - name: Validate standalone auth guard workflow
        shell: bash
        run: |
          set -euo pipefail
          workflow='.github/workflows/nav-v2-deal-api-auth-guard.yml'
          test -f "$workflow"
          grep -Fq 'workflow_dispatch' "$workflow"
          grep -Fq 'Navigator v2 deal API auth guard' "$workflow"
          grep -Fq 'read_action' "$workflow"
          grep -Fq 'Read action to auth-guard-test' "$workflow"
          grep -Fq 'get_deal_card_lite' "$workflow"
          grep -Fq 'NAV_V2_ACTION' "$workflow"
          grep -Fq 'Validate read action input' "$workflow"
          grep -Fq 'workflow_dispatch input read_action must be get_deal_card or get_deal_card_lite.' "$workflow"
          grep -Fq 'Read action input is supported.' "$workflow"
          grep -Fq 'Verify unauthenticated requests are rejected' "$workflow"
          grep -Fq 'GITHUB_STEP_SUMMARY' "$workflow"
          grep -Fq 'Unauthenticated ${NAV_V2_ACTION} request was rejected as expected.' "$workflow"
          grep -Fq 'node --check tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'node tools/nav_v2_deal_api_auth_guard_test.mjs' "$workflow"
          grep -Fq 'NAV_V2_DEAL_ID' "$workflow"
          grep -Fq 'NAV_V2_SUPABASE_URL' "$workflow"
          if grep -nE 'NAV_V2_JWT|secrets\.|sb_secret_|SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY' "$workflow"; then
            echo 'Standalone auth guard workflow must not use secrets, JWT, or service-role markers.' >&2
            exit 1
          fi
          if grep -nE 'eyJ[a-zA-Z0-9_-]{20,}' "$workflow"; then
            echo 'Standalone auth guard workflow must not contain literal JWTs.' >&2
            exit 1
          fi
