name: Static checks

on:
  push:
    branches: [ main, improve-site-crm ]
  pull_request:
    branches: [ main ]

jobs:
  validate-static-files:
    name: Validate SEO files, assets and secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate robots.txt
        run: |
          test -f robots.txt
          grep -q '^User-agent:' robots.txt
          grep -q '^Allow:' robots.txt
          grep -q '^Sitemap:' robots.txt
          grep -q '^Host:' robots.txt
          if grep -q 'User-agent: .* Allow:' robots.txt; then
            echo "robots.txt directives must be placed on separate lines"
            exit 1
          fi

      - name: Validate sitemap.xml
        run: |
          test -f sitemap.xml
          python3 - <<'PY'
          import pathlib
          import sys
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse

          try:
              root = ET.parse('sitemap.xml').getroot()
          except ET.ParseError as exc:
              print(f'sitemap.xml is not valid XML: {exc}')
              sys.exit(1)

          if not root.tag.endswith('urlset'):
              print('sitemap.xml root must be urlset')
              sys.exit(1)

          urls = [node for node in root if node.tag.endswith('url')]
          if not urls:
              print('sitemap.xml must contain at least one url')
              sys.exit(1)

          for node in urls:
              loc_node = next((child for child in node if child.tag.endswith('loc')), None)
              if loc_node is None or not (loc_node.text or '').strip():
                  print('Every sitemap url must contain loc')
                  sys.exit(1)
              loc = loc_node.text.strip()
              parsed = urlparse(loc)
              if parsed.netloc != 'www.lider-bsk.ru':
                  print(f'Unexpected sitemap host: {loc}')
                  sys.exit(1)
              path = parsed.path.lstrip('/') or 'index.html'
              if path.endswith('/'):
                  path += 'index.html'
              if not pathlib.Path(path).exists():
                  print(f'Sitemap points to missing file: {path}')
                  sys.exit(1)
          PY

      - name: Validate public lead assets
        run: |
          test -f assets/public-lead-form.css
          test -f assets/public-lead-form.js
          grep -q 'overflow-x:hidden' assets/public-lead-form.css
          grep -q 'request_id' assets/public-lead-form.js
          grep -q 'page_path' assets/public-lead-form.js
          grep -q 'submitted_at' assets/public-lead-form.js
          if grep -q 'header .brand .mark,.*display:none!important' assets/public-lead-form.css; then
            echo "The site logo mark must not be hidden by public-lead-form.css"
            exit 1
          fi

      - name: Validate public lead edge function
        run: |
          fn='supabase/functions/leader-public-lead/index.ts'
          test -f "$fn"
          grep -q 'leader_public_lead_audit' "$fn"
          grep -q 'leader_leads?on_conflict=request_id' "$fn"
          grep -q 'resolution=ignore-duplicates,return=minimal' "$fn"
          grep -q 'phone_or_message_required' "$fn"
          grep -q 'honeypot_filled' "$fn"
          grep -q "result: 'accepted'" "$fn"
          grep -q "result: 'suspicious'" "$fn"
          grep -q "result: 'rejected'" "$fn"
          grep -q "result: 'error'" "$fn"
          grep -q 'catch (_)' "$fn"
          grep -q 'Аудит не должен блокировать получение заявки' "$fn"

      - name: Validate CRM leads edge function
        run: |
          fn='supabase/functions/leader-crm-leads/index.ts'
          test -f "$fn"
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$fn"
          grep -q '/auth/v1/user' "$fn"
          grep -q 'missing_token' "$fn"
          grep -q 'bad_token' "$fn"
          grep -q 'access_denied' "$fn"
          grep -q 'leader_user_profiles?user_id=eq.' "$fn"
          grep -q "if (action === 'ensure_profile')" "$fn"
          grep -q "if (action === 'create_order_from_offer')" "$fn"
          grep -q 'offer_not_approved' "$fn"
          grep -q 'already_created' "$fn"
          grep -q "created_from: 'create_order_from_offer'" "$fn"
          grep -q 'leader_commercial_offer_events' "$fn"
          grep -q 'unknown_action' "$fn"

      - name: Validate CRM orders edge function
        run: |
          fn='supabase/functions/leader-crm-orders/index.ts'
          test -f "$fn"
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$fn"
          grep -q '/auth/v1/user' "$fn"
          grep -q 'missing_token' "$fn"
          grep -q 'bad_token' "$fn"
          grep -q 'access_denied' "$fn"
          grep -q 'leader_user_profiles?user_id=eq.' "$fn"
          grep -q "if (action === 'list')" "$fn"
          grep -q "if (action === 'update')" "$fn"
          grep -q 'leader_orders?select=' "$fn"
          grep -q 'order=created_at.desc&limit=80' "$fn"
          grep -q 'order_update_failed' "$fn"
          grep -q 'production_status' "$fn"
          grep -q 'payment_status' "$fn"
          grep -q 'layout_status' "$fn"
          grep -q 'unknown_action' "$fn"

      - name: Validate CRM v4 assets
        run: |
          test -f crm/v4/index.html
          test -f crm/v4/assets/v4/auth.js
          test -f crm/v4/assets/v4/functions-client.js
          test -f crm/v4/assets/v4/site-cache-note-v1.js
          test -f crm/v4/assets/v4/crm-ui-selfcheck-v1.js
          test -f crm/v4/assets/v4/public-lead-audit-v1.js
          python3 - <<'PY'
          import pathlib
          import sys
          from html.parser import HTMLParser
          from urllib.parse import urlparse

          root = pathlib.Path('crm/v4')
          html_path = root / 'index.html'
          refs = []

          class AssetParser(HTMLParser):
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == 'script' and values.get('src'):
                      refs.append(values['src'])
                  if tag == 'link' and values.get('href'):
                      refs.append(values['href'])

          AssetParser().feed(html_path.read_text(encoding='utf-8'))
          missing = []
          for ref in refs:
              parsed = urlparse(ref)
              if parsed.scheme or parsed.netloc or parsed.path.startswith('/'):
                  continue
              if not parsed.path or parsed.path.startswith('#'):
                  continue
              path = (root / parsed.path).resolve()
              try:
                  path.relative_to(root.resolve())
              except ValueError:
                  print(f'CRM asset reference leaves crm/v4: {ref}')
                  sys.exit(1)
              if not path.is_file():
                  missing.append(ref)
          if missing:
              print('Missing CRM v4 referenced assets:')
              for ref in missing:
                  print(f'- {ref}')
              sys.exit(1)
          PY
          python3 - <<'PY'
          import pathlib
          import sys

          expected_tabs = [
              ('management_dashboard', 'Дашборд'),
              ('leads', 'Заявки'),
              ('orders', 'Заказы'),
              ('order_control', 'Контроль заказов'),
              ('finance_control', 'Финансы'),
              ('production', 'Производство'),
              ('contact_control', 'Контроль контактов'),
              ('public_lead_audit', 'Аудит заявок'),
          ]
          menu = pathlib.Path('crm/v4/assets/v4/crm-v4-expanded-menu-v1.js').read_text(encoding='utf-8')
          selfcheck = pathlib.Path('crm/v4/assets/v4/crm-ui-selfcheck-v1.js').read_text(encoding='utf-8')
          failed = []
          for key, label in expected_tabs:
              if f"tab: '{key}'" not in menu or f"label: '{label}'" not in menu:
                  failed.append(f'menu missing {key} / {label}')
              if f"key: '{key}'" not in selfcheck or f"label: '{label}'" not in selfcheck:
                  failed.append(f'selfcheck missing {key} / {label}')
          if failed:
              print('CRM v4 expected tabs are incomplete:')
              for item in failed:
                  print(f'- {item}')
              sys.exit(1)
          PY
          grep -q 'assets/v4/management-dashboard-v3.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/crm-v4-expanded-menu-v1.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/auth.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/leads.js?v=20260528-2' crm/v4/index.html
          grep -q 'assets/v4/contact-control-v1.js?v=20260621-1' crm/v4/index.html
          grep -q 'assets/v4/orders-fast-loader-v1.js?v=20260622-2' crm/v4/index.html
          grep -q 'assets/v4/order-card-v1.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/order-control-v2.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/finance-control-v2.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/production-board-v3.js?v=20260622-3' crm/v4/index.html
          grep -q 'assets/v4/production-alerts-v1.js?v=20260622-2' crm/v4/index.html
          grep -q 'assets/v4/production-job-card-v2.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/installation-job-card-v2.js?v=20260622-1' crm/v4/index.html
          grep -q 'assets/v4/site-cache-note-v1.js?v=20260622-2' crm/v4/index.html
          grep -q "crm-ui-selfcheck-v1.js?v=20260622-2" crm/v4/assets/v4/site-cache-note-v1.js
          grep -q "public-lead-audit-v1.js?v=20260621-1" crm/v4/assets/v4/site-cache-note-v1.js
          grep -q 'leader_public_lead_audit' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'limit(80)' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q "order('created_at'" crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'request_id' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'phone_normalized' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'source_page_path' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'page_url' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'user_agent' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'referer' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'utm_source' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'utm_medium' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'utm_campaign' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'result' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'reason' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'payload' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'data-public-lead-audit-refresh' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'data-public-lead-audit-filter' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'accepted' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'suspicious' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'rejected' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'error' crm/v4/assets/v4/public-lead-audit-v1.js
          grep -q 'supabaseClient.auth.getSession()' crm/v4/assets/v4/functions-client.js
          grep -q 'session.access_token' crm/v4/assets/v4/functions-client.js
          grep -q 'Authorization: `Bearer ${session.access_token}`' crm/v4/assets/v4/functions-client.js
          grep -q '/functions/v1/' crm/v4/assets/v4/functions-client.js
          grep -q 'encodeURIComponent(name)' crm/v4/assets/v4/functions-client.js
          grep -q "invokeLeaderFunction('leader-crm-leads', { action: 'ensure_profile' }" crm/v4/assets/v4/auth.js
          if grep -q 'leader_ensure_profile' crm/v4/assets/v4/auth.js; then
            echo "CRM auth.js must not call leader_ensure_profile directly"
            exit 1
          fi
          if grep -RInE 'leader_ensure_profile|leader_get_leads_for_crm|leader_create_order_rpc|leader_log' crm/v4/assets/v4; then
            echo "CRM frontend assets must not call closed leader RPC functions directly"
            exit 1
          fi
          if grep -RInE 'SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY|sb_secret_' crm/v4/assets/v4; then
            echo "CRM frontend assets must not contain service-role or secret keys"
            exit 1
          fi

      - name: Validate Supabase hardening migrations
        run: |
          leads_migration='supabase/migrations/20260623_tighten_leader_leads_grants.sql'
          audit_migration='supabase/migrations/20260623_tighten_leader_public_lead_audit_grants.sql'

          test -f "$leads_migration"
          test -f "$audit_migration"

          grep -q 'on table public.leader_leads' "$leads_migration"
          grep -q 'from anon;' "$leads_migration"
          grep -q 'from authenticated;' "$leads_migration"
          grep -q 'grant insert' "$leads_migration"
          grep -q 'grant select, insert, update, delete' "$leads_migration"
          grep -q 'revoke select, update, delete, truncate, references, trigger' "$leads_migration"
          grep -q 'revoke truncate, references, trigger' "$leads_migration"

          grep -q 'on table public.leader_public_lead_audit' "$audit_migration"
          grep -q 'from anon;' "$audit_migration"
          grep -q 'from authenticated;' "$audit_migration"
          grep -q 'grant insert' "$audit_migration"
          grep -q 'grant select' "$audit_migration"
          grep -q 'revoke select, update, delete, truncate, references, trigger' "$audit_migration"
          grep -q 'revoke insert, update, delete, truncate, references, trigger' "$audit_migration"

      - name: Check that secret keys are not committed
        run: |
          if grep -RInE \
            --exclude-dir=.git \
            --exclude='static-checks.yml' \
            'SUPABASE_SERVICE_ROLE(_KEY)?[[:space:]]*[:=]|SERVICE_ROLE_KEY[[:space:]]*[:=]|sb_secret_[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9_-]{20,}' .; then
            echo "Possible secret key found. Remove it from repository."
            exit 1
          fi
