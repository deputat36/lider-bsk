name: Static checks

on:
  push:
    branches: [main, improve-site-crm]
  pull_request:
    branches: [main]

jobs:
  validate-static-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SEO files
        shell: bash
        run: |
          set -euo pipefail
          test -f robots.txt
          grep -q '^User-agent:' robots.txt
          grep -q '^Allow:' robots.txt
          grep -q '^Sitemap:' robots.txt
          test -f sitemap.xml
          python3 - <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse
          root = ET.parse('sitemap.xml').getroot()
          assert root.tag.endswith('urlset')
          urls = [node for node in root if node.tag.endswith('url')]
          assert urls
          for node in urls:
              loc = next(child for child in node if child.tag.endswith('loc')).text.strip()
              parsed = urlparse(loc)
              assert parsed.netloc == 'www.lider-bsk.ru'
              path = parsed.path.lstrip('/') or 'index.html'
              if path.endswith('/'):
                  path += 'index.html'
              assert pathlib.Path(path).is_file(), path
          PY

      - name: Validate public lead form and function
        shell: bash
        run: |
          set -euo pipefail
          form='assets/public-lead-form.js'
          test -f assets/public-lead-form.css
          test -f "$form"
          grep -q 'overflow-x:hidden' assets/public-lead-form.css
          grep -q 'request_id' "$form"
          grep -q 'page_path' "$form"
          grep -q 'submitted_at' "$form"
          grep -Fq "website:field(form,'website')" "$form"
          grep -lF 'assets/public-lead-form.js?v=4' -- *.html >/dev/null
          if grep -lF 'assets/public-lead-form.js?v=3' -- *.html; then
            echo 'Old public form cache version remains.' >&2
            exit 1
          fi
          if grep -Fq "if(field(form,'website'))return" "$form"; then
            echo 'Client-side honeypot bypasses the server audit.' >&2
            exit 1
          fi
          fn='supabase/functions/leader-public-lead/index.ts'
          test -f "$fn"
          grep -q 'leader_leads?on_conflict=request_id' "$fn"
          grep -q 'resolution=ignore-duplicates,return=minimal' "$fn"
          grep -q 'leader_public_lead_audit' "$fn"
          grep -q 'if (!auditRes.ok)' "$fn"
          grep -q 'leader_public_lead_audit_insert_failed' "$fn"
          grep -q 'leader_public_lead_audit_request_failed' "$fn"
          grep -q 'site_public_form_v7' "$fn"

      - name: Validate CRM Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          leads='supabase/functions/leader-crm-leads/index.ts'
          orders='supabase/functions/leader-crm-orders/index.ts'
          test -f "$leads"
          test -f "$orders"
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$leads"
          grep -q '/auth/v1/user' "$leads"
          grep -q "if (action === 'ensure_profile')" "$leads"
          grep -q "if (action === 'create_order_from_offer')" "$leads"
          grep -q 'offer_not_approved' "$leads"
          grep -q 'already_created' "$leads"
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$orders"
          grep -q '/auth/v1/user' "$orders"
          grep -q "if (action === 'list')" "$orders"
          grep -q "if (action === 'update')" "$orders"

      - name: Validate CRM referenced assets
        run: |
          python3 - <<'PY'
          import pathlib
          import sys
          from html.parser import HTMLParser
          from urllib.parse import urlparse
          root = pathlib.Path('crm/v4').resolve()
          refs = []
          class Parser(HTMLParser):
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == 'script' and values.get('src'):
                      refs.append(values['src'])
                  if tag == 'link' and values.get('href'):
                      refs.append(values['href'])
          Parser().feed((root / 'index.html').read_text(encoding='utf-8'))
          missing = []
          for ref in refs:
              parsed = urlparse(ref)
              if parsed.scheme or parsed.netloc or parsed.path.startswith('/'):
                  continue
              path = (root / parsed.path).resolve()
              try:
                  path.relative_to(root)
              except ValueError:
                  sys.exit(f'Asset escapes CRM root: {ref}')
              if not path.is_file():
                  missing.append(ref)
          if missing:
              sys.exit('Missing CRM assets: ' + ', '.join(missing))
          PY

      - name: Validate main CRM session isolation
        shell: bash
        run: |
          set -euo pipefail
          page='crm/v4/index.html'
          config='crm/v4/assets/v4/config.js'
          reset='crm/v4/assets/v4/auth-session-reset-v1.js'
          auth='crm/v4/assets/v4/auth.js'
          functions='crm/v4/assets/v4/functions-client.js'
          loader='crm/v4/assets/v4/site-cache-note-v1.js'
          selfcheck='crm/v4/assets/v4/crm-ui-selfcheck-v1.js'

          grep -Fq 'assets/v4/auth.js?v=20260624-contour-1' "$page"
          grep -Fq 'assets/v4/auth-session-reset-v1.js?v=20260624-contour-1' "$page"
          grep -Fq "crm-ui-selfcheck-v1.js?v=20260624-contour-1" "$loader"
          grep -Fq "authStorageKey: 'leader_crm_v4_main_session'" "$config"
          grep -Fq "const CRM_SESSION_KEY = 'leader_crm_v4_main_session'" "$reset"
          grep -Fq "const LEGACY_SHARED_SESSION_KEY = 'leader_crm_v4_session'" "$reset"
          grep -Fq "const EXPECTED_STORAGE_KEY = 'leader_crm_v4_main_session'" "$selfcheck"
          grep -Fq "const LEGACY_STORAGE_KEY = 'leader_crm_v4_session'" "$selfcheck"
          grep -Fq "row('Контур', 'Основной'" "$selfcheck"
          grep -Fq "row('Сессия контура'" "$selfcheck"
          grep -Fq "row('Старый общий ключ'" "$selfcheck"
          grep -Fq "signOut({ scope: 'local' })" "$auth"
          grep -Fq 'refresh_token_not_found' "$auth"
          grep -Fq 'session.access_token' "$functions"

          if grep -Fq "authStorageKey: 'leader_crm_v4_session'" "$config"; then
            echo 'Main CRM must not use the legacy shared auth key.' >&2
            exit 1
          fi
          if grep -RInE 'SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY|sb_secret_' crm/v4/assets/v4; then
            echo 'CRM frontend contains a privileged key marker.' >&2
            exit 1
          fi
          if grep -RInE 'leader_ensure_profile|leader_get_leads_for_crm|leader_create_order_rpc|leader_log' crm/v4/assets/v4; then
            echo 'CRM frontend calls a closed RPC directly.' >&2
            exit 1
          fi

      - name: Validate CRM modules and audit
        shell: bash
        run: |
          set -euo pipefail
          page='crm/v4/index.html'
          for marker in management-dashboard-v3.js crm-v4-expanded-menu-v1.js leads.js contact-control-v1.js orders-fast-loader-v1.js order-card-v1.js order-control-v2.js finance-control-v2.js production-board-v3.js production-job-card-v2.js installation-job-card-v2.js site-cache-note-v1.js; do
            grep -Fq "$marker" "$page"
          done
          audit='crm/v4/assets/v4/public-lead-audit-v1.js'
          grep -Fq 'leader_public_lead_audit' "$audit"
          grep -Fq 'limit(80)' "$audit"
          grep -Fq 'payloadText' "$audit"
          grep -Fq 'Referer:' "$audit"
          grep -Fq 'Технические данные' "$audit"

      - name: Validate hardening migrations
        run: |
          test -f supabase/migrations/20260623_tighten_leader_leads_grants.sql
          test -f supabase/migrations/20260623_tighten_leader_public_lead_audit_grants.sql

      - name: Check committed secrets
        shell: bash
        run: |
          if grep -RInE --exclude-dir=.git --exclude='static-checks.yml' 'SUPABASE_SERVICE_ROLE(_KEY)?[[:space:]]*[:=]|SERVICE_ROLE_KEY[[:space:]]*[:=]|sb_secret_[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9_-]{20,}' .; then
            echo 'Possible secret key found.' >&2
            exit 1
          fi
