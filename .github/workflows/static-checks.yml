name: Static checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-static-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SEO files
        shell: bash
        run: |
          set -euo pipefail
          test -f robots.txt
          grep -q '^User-agent:' robots.txt
          grep -q '^Allow:' robots.txt
          grep -q '^Sitemap:' robots.txt
          test -f sitemap.xml
          python3 - <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse
          root = ET.parse('sitemap.xml').getroot()
          assert root.tag.endswith('urlset')
          urls = [node for node in root if node.tag.endswith('url')]
          assert urls
          for node in urls:
              loc = next(child for child in node if child.tag.endswith('loc')).text.strip()
              parsed = urlparse(loc)
              assert parsed.netloc == 'www.lider-bsk.ru'
              path = parsed.path.lstrip('/') or 'index.html'
              if path.endswith('/'):
                  path += 'index.html'
              assert pathlib.Path(path).is_file(), path
          PY

      - name: Validate public lead form and function
        shell: bash
        run: |
          set -euo pipefail
          form='assets/public-lead-form.js'
          test -f assets/public-lead-form.css
          test -f "$form"
          grep -q 'overflow-x:hidden' assets/public-lead-form.css
          grep -q 'request_id' "$form"
          grep -q 'page_path' "$form"
          grep -q 'submitted_at' "$form"
          grep -Fq "website:field(form,'website')" "$form"
          grep -lF 'assets/public-lead-form.js?v=4' -- *.html >/dev/null
          if grep -lF 'assets/public-lead-form.js?v=3' -- *.html; then
            echo 'Old public form JS cache version remains.' >&2
            exit 1
          fi
          if grep -Fq "if(field(form,'website'))return" "$form"; then
            echo 'Client-side honeypot bypasses the server audit.' >&2
            exit 1
          fi
          fn='supabase/functions/leader-public-lead/index.ts'
          test -f "$fn"
          grep -q "/rest/v1/leader_leads'" "$fn"
          grep -q "result: 'accepted'" "$fn"
          grep -q "result: 'duplicate'" "$fn"
          grep -q "reason: 'request_id_conflict'" "$fn"
          grep -q 'isDuplicateRequest' "$fn"
          grep -q 'duplicate: true' "$fn"
          if grep -q 'leader_leads?on_conflict=request_id' "$fn"; then
            echo 'Public lead v8 must not hide duplicates with on_conflict.' >&2
            exit 1
          fi
          if grep -q 'resolution=ignore-duplicates' "$fn"; then
            echo 'Public lead v8 must write duplicate audit events explicitly.' >&2
            exit 1
          fi
          grep -q 'leader_public_lead_audit' "$fn"
          grep -q 'if (!auditRes.ok)' "$fn"
          grep -q 'leader_public_lead_audit_insert_failed' "$fn"
          grep -q 'leader_public_lead_audit_request_failed' "$fn"
          grep -q 'site_public_form_v7' "$fn"

      - name: Validate CRM Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          leads='supabase/functions/leader-crm-leads/index.ts'
          orders='supabase/functions/leader-crm-orders/index.ts'
          test -f "$leads"
          test -f "$orders"
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$leads"
          grep -q '/auth/v1/user' "$leads"
          grep -q "if (action === 'ensure_profile')" "$leads"
          grep -q "role: 'manager', is_active: false" "$leads"
          grep -q "if (action === 'create_order_from_offer')" "$leads"
          grep -q 'leader_create_order_from_offer_rpc' "$leads"
          grep -q 'body: JSON.stringify({ p_payload: payload })' "$leads"
          if grep -q 'offer_not_approved' "$leads"; then
            echo 'create_order_from_offer must delegate validation to leader_create_order_from_offer_rpc.' >&2
            exit 1
          fi
          if grep -q 'calculation_items_read_failed' "$leads"; then
            echo 'create_order_from_offer must not use the old multi-request manual conversion path.' >&2
            exit 1
          fi
          grep -q "Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')" "$orders"
          grep -q '/auth/v1/user' "$orders"
          grep -q "if (action === 'list')" "$orders"
          grep -q "if (action === 'update')" "$orders"

      - name: Validate Navigator v2 deal API source
        shell: bash
        run: |
          set -euo pipefail
          fn='supabase/functions/nav-v2-deal-api/index.ts'
          config='supabase/config.toml'
          test -f "$fn"
          test -f "$config"
          grep -Fq '[functions.nav-v2-deal-api]' "$config"
          grep -Fq 'verify_jwt = true' "$config"
          grep -Fq 'Deno.serve' "$fn"
          grep -Fq 'getAuthUser' "$fn"
          grep -Fq '/auth/v1/user' "$fn"
          grep -Fq 'SUPABASE_URL' "$fn"
          grep -Fq 'SUPABASE_ANON_KEY' "$fn"
          grep -Fq 'callUserRpc' "$fn"
          grep -Fq '/rest/v1/rpc/' "$fn"
          grep -Fq 'parseUuid' "$fn"
          grep -Fq 'parseEnum' "$fn"
          grep -Fq 'get_deal_card' "$fn"
          grep -Fq 'get_deal_card_lite' "$fn"
          grep -Fq 'add_comment' "$fn"
          grep -Fq 'update_deal_status' "$fn"
          grep -Fq 'update_document_status' "$fn"
          grep -Fq 'update_document_workflow' "$fn"
          grep -Fq 'update_task_status' "$fn"
          grep -Fq 'nav_v2_get_deal_card' "$fn"
          grep -Fq 'nav_v2_get_deal_card_lite' "$fn"
          grep -Fq 'nav_v2_add_comment' "$fn"
          grep -Fq 'nav_v2_update_deal_status' "$fn"
          grep -Fq 'nav_v2_update_document_status' "$fn"
          grep -Fq 'nav_v2_update_document_workflow' "$fn"
          grep -Fq 'nav_v2_update_task_status' "$fn"
          if grep -R -nE 'sb_secret_|eyJ[a-zA-Z0-9_-]{20,}' supabase/functions/nav-v2-deal-api; then
            echo 'Function source must not contain literal Supabase secret keys or JWTs.' >&2
            exit 1
          fi
          if grep -Fq 'SUPABASE_SERVICE_ROLE_KEY' "$fn" || grep -Fq 'SERVICE_ROLE_KEY' "$fn"; then
            echo 'Navigator v2 deal API must not use service-role keys.' >&2
            exit 1
          fi
          if grep -Fq 'supabase.rpc(' "$fn"; then
            echo 'Navigator v2 deal API must not proxy arbitrary RPC calls.' >&2
            exit 1
          fi

      - name: Validate CRM referenced assets
        run: |
          python3 - <<'PY'
          import pathlib
          import sys
          from html.parser import HTMLParser
          from urllib.parse import urlparse
          root = pathlib.Path('crm/v4').resolve()
          refs = []
          class Parser(HTMLParser):
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == 'script' and values.get('src'):
                      refs.append(values['src'])
                  if tag == 'link' and values.get('href'):
                      refs.append(values['href'])
          Parser().feed((root / 'index.html').read_text(encoding='utf-8'))
          missing = []
          for ref in refs:
              parsed = urlparse(ref)
              if parsed.scheme or parsed.netloc:
                  continue
              path = parsed.path.lstrip('/')
              if not path.startswith('crm/v4/'):
                  path = 'crm/v4/' + path
              target = pathlib.Path(path).resolve()
              if not str(target).startswith(str(root)):
                  continue
              if not target.is_file():
                  missing.append(path)
          if missing:
              print('\n'.join(missing))
              sys.exit(1)
          PY

      - name: Validate CRM v4 composition
        shell: bash
        run: |
          set -euo pipefail
          index='crm/v4/index.html'
          test -f "$index"
          grep -q 'management-dashboard-v3.js' "$index"
          grep -q 'crm-v4-expanded-menu-v1.js' "$index"
          grep -q 'leads.js' "$index"
          grep -q 'contact-control-v1.js' "$index"
          grep -q 'orders-fast-loader-v1.js' "$index"
          grep -q 'order-card-v1.js' "$index"
          grep -q 'order-control-v2.js' "$index"
          grep -q 'finance-control-v2.js' "$index"
          grep -q 'production-board-v3.js' "$index"
          grep -q 'production-alerts-v1.js' "$index"
          grep -q 'production-job-card-v2.js' "$index"
          grep -q 'installation-job-card-v2.js' "$index"
          grep -q 'site-cache-note-v1.js' "$index"
          grep -q 'site-cache-note-v1.js?v=20260627-access-route-1' "$index"

      - name: Validate CRM browser assets do not expose secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -nE 'SUPABASE_SERVICE_ROLE|SERVICE_ROLE_KEY|sb_secret_' crm/v4/assets/v4; then
            echo 'Potential service role secret marker found in browser assets.' >&2
            exit 1
          fi

      - name: Validate CRM protected RPC usage
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n 'leader_create_order_rpc' crm/v4/assets/v4; then
            echo 'Browser assets must not call leader_create_order_rpc directly.' >&2
            exit 1
          fi
          if grep -R -n 'leader_ensure_profile' crm/v4/assets/v4/auth.js; then
            echo 'auth.js must use Edge Function ensure_profile instead of direct RPC.' >&2
            exit 1
          fi
          grep -R -n "action: 'ensure_profile'" crm/v4/assets/v4/auth.js

      - name: Validate public lead audit assets
        shell: bash
        run: |
          set -euo pipefail
          loader='crm/v4/assets/v4/site-cache-note-v1.js'
          audit='crm/v4/assets/v4/public-lead-audit-v1.js'
          helper='crm/v4/assets/v4/public-lead-audit-helper-v1.js'
          summary='crm/v4/assets/v4/public-lead-audit-summary-v1.js'
          selfcheck='crm/v4/assets/v4/crm-ui-selfcheck-v1.js'
          test -f "$loader"
          test -f "$audit"
          test -f "$helper"
          test -f "$summary"
          test -f "$selfcheck"
          grep -q 'CRM_ACCESS_ROUTE_VERSION' "$loader"
          grep -q 'CRM build:' "$loader"
          grep -q '20260627-access-route-1' "$loader"
          grep -q 'crm-ui-selfcheck-v1.js?v=20260630-selfcheck-2' "$loader"
          grep -q 'public-lead-audit-v1.js?v=20260629-trace-button-1' "$loader"
          grep -q 'public-lead-audit-helper-v1.js?v=20260629-trace-open-lead-1' "$loader"
          grep -q 'public-lead-audit-summary-v1.js?v=20260629-request-summary-1' "$loader"
          grep -q 'leader_public_lead_audit' "$audit"
          grep -q 'created_at' "$audit"
          grep -q 'referer' "$audit"
          grep -q 'payload' "$audit"
          grep -q 'duplicate' "$audit"
          grep -q 'data-public-lead-audit-copy' "$audit"
          grep -q 'data-public-lead-audit-trace' "$audit"
          grep -q 'leader_request_trace' "$helper"
          grep -q 'publicLeadTraceFormV1' "$helper"
          grep -q 'Проверить request_id' "$helper"
          grep -q 'data-public-trace-open-lead' "$helper"
          grep -q 'С request_id' "$summary"
          grep -q 'Без request_id' "$summary"

      - name: Validate CRM selfcheck tabs
        shell: bash
        run: |
          set -euo pipefail
          menu='crm/v4/assets/v4/crm-v4-expanded-menu-v1.js'
          selfcheck='crm/v4/assets/v4/crm-ui-selfcheck-v1.js'
          for tab in management_dashboard leads orders order_control finance_control production contact_control public_lead_audit user_admin; do
            grep -q "$tab" "$menu"
            grep -q "$tab" "$selfcheck"
          done
          grep -q 'CRM_ACCESS_ROUTE_VERSION' "$selfcheck"
          grep -q 'Маршрут Доступ' "$selfcheck"
          grep -q 'Прямой маршрут Доступ' "$selfcheck"
          grep -q 'Build marker' "$selfcheck"
          grep -q 'siteCacheNoteV1' "$selfcheck"
          grep -q 'Дизайн в заказах' "$selfcheck"
          grep -q 'checkDesignTools' "$selfcheck"
