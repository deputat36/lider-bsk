name: Apply public request reference

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-public-request-reference.yml

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show request reference and refresh cache version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          form = Path('assets/public-lead-form.js')
          text = form.read_text(encoding='utf-8')
          old = """      const res=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('Ошибка '+res.status);
      setStatus(form,'ok','Заявка отправлена. Мы свяжемся с вами для уточнения деталей.');
"""
          new = """      const res=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json().catch(()=>({}));
      if(!res.ok)throw new Error('Ошибка '+res.status);
      const confirmedRequestId=clean(data&&data.request_id)||rid;
      form.dataset.lastRequestId=confirmedRequestId;
      setStatus(form,'ok','Заявка отправлена. Номер обращения: '+confirmedRequestId+'. Мы свяжемся с вами для уточнения деталей.');
"""
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one public form response block')
          form.write_text(text.replace(old, new, 1), encoding='utf-8')

          changed = 0
          for path in Path('.').glob('*.html'):
              page = path.read_text(encoding='utf-8')
              if 'assets/public-lead-form.js?v=4' in page:
                  path.write_text(page.replace('assets/public-lead-form.js?v=4', 'assets/public-lead-form.js?v=5'), encoding='utf-8')
                  changed += 1
          if not changed:
              raise SystemExit('No public page used the expected form cache version v=4')

          checks = Path('.github/workflows/static-checks.yml')
          workflow = checks.read_text(encoding='utf-8')
          workflow = workflow.replace("assets/public-lead-form.js?v=4", "assets/public-lead-form.js?v=5")
          workflow = workflow.replace(
              "          grep -Fq \"website:field(form,'website')\" \"$form\"\n",
              "          grep -Fq \"website:field(form,'website')\" \"$form\"\n"
              "          grep -Fq 'const data=await res.json().catch' \"$form\"\n"
              "          grep -Fq 'form.dataset.lastRequestId=confirmedRequestId' \"$form\"\n"
              "          grep -Fq 'Номер обращения:' \"$form\"\n",
              1,
          )
          workflow = workflow.replace(
              "          if grep -lF 'assets/public-lead-form.js?v=3' -- *.html; then\n",
              "          if grep -lF 'assets/public-lead-form.js?v=4' -- *.html; then\n",
              1,
          )
          checks.write_text(workflow, encoding='utf-8')
          PY

          node --check assets/public-lead-form.js
          grep -Fq 'Номер обращения:' assets/public-lead-form.js
          grep -lF 'assets/public-lead-form.js?v=5' -- *.html >/dev/null
          if grep -lF 'assets/public-lead-form.js?v=4' -- *.html; then
            echo 'Old public form cache version remains.' >&2
            exit 1
          fi

      - name: Commit update and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-public-request-reference.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/public-lead-form.js .github/workflows/static-checks.yml .github/workflows/apply-public-request-reference.yml -- '*.html'
          git commit -m 'Show public lead request reference'
          git push origin HEAD:main
