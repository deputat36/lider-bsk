name: CRM auth checks

on:
  push:
    branches: [main, improve-site-crm]
    paths:
      - 'crm/v4/index.html'
      - 'crm/v4/assets/v4/auth.js'
      - 'crm/v4/assets/v4/auth-session-reset-v1.js'
      - 'crm/v4/assets/v4/config.js'
      - '.github/workflows/crm-auth-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crm/v4/index.html'
      - 'crm/v4/assets/v4/auth.js'
      - 'crm/v4/assets/v4/auth-session-reset-v1.js'
      - 'crm/v4/assets/v4/config.js'
      - '.github/workflows/crm-auth-checks.yml'

jobs:
  validate-crm-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check local session recovery
        shell: bash
        run: |
          set -euo pipefail
          page='crm/v4/index.html'
          auth='crm/v4/assets/v4/auth.js'
          reset='crm/v4/assets/v4/auth-session-reset-v1.js'
          config='crm/v4/assets/v4/config.js'
          test -f "$page"
          test -f "$auth"
          test -f "$reset"
          test -f "$config"
          grep -Fq "refresh_token_not_found" "$auth"
          grep -Fq "signOut({ scope: 'local' })" "$auth"
          grep -Fq 'localStorage.removeItem(V4_CONFIG.authStorageKey)' "$auth"
          grep -Fq 'CRM v4 logout warning:' "$auth"
          grep -Fq "authStorageKey: 'leader_crm_v4_session'" "$config"
          grep -Fq "const CRM_SESSION_KEY = 'leader_crm_v4_session'" "$reset"
          grep -Fq 'localStorage.removeItem(CRM_SESSION_KEY)' "$reset"
          grep -Fq 'assets/v4/auth.js?v=20260623-session-2' "$page"
          if grep -Fq 'supabaseClient.auth.signOut()' "$auth"; then
            echo 'Bare signOut() would revoke sessions beyond the current browser.' >&2
            exit 1
          fi
          if grep -Eq "startsWith\('sb-'\)|includes\('supabase'\)|Object\.keys\(localStorage\)" "$reset"; then
            echo 'CRM fallback cleanup must not delete sessions belonging to other applications.' >&2
            exit 1
          fi
