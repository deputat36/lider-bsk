name: CRM access quick link check

on:
  push:
    branches: [main, improve-site-crm]
  pull_request:
    branches: [main]

jobs:
  validate-crm-access-quick-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CRM access quick link
        shell: bash
        run: |
          set -euo pipefail
          index='crm/v4/index.html'
          runbook='docs/CRM_ACCESS_TAB_CHECK_2026-06-27.md'
          status='docs/STATUS.md'
          issue_template='.github/ISSUE_TEMPLATE/crm-v4-browser-test.md'
          checklist='docs/CRM_V4_TESTER_CHECKLIST.md'
          report='docs/CRM_V4_BROWSER_TEST_REPORT.md'
          test -f "$index"
          test -f "$runbook"
          test -f "$status"
          test -f "$issue_template"
          test -f "$checklist"
          test -f "$report"
          grep -Fq 'href="?tab=user_admin"' "$index"
          grep -Fq 'Открыть доступ CRM' "$index"
          grep -Fq 'data-v4-tab-button="user_admin"' "$index"
          grep -Fq 'crm-v4-tabs-lite.js?v=20260627-access-route-1' "$index"
          grep -Fq 'auth.js?v=20260627-access-3' "$index"
          grep -Fq 'Открыть доступ CRM' "$runbook"
          grep -Fq 'href="?tab=user_admin"' "$runbook"
          grep -Fq 'active access admins' "$runbook"
          grep -Fq 'inactive profiles: 0' "$runbook"
          grep -Fq 'Открыть доступ CRM' "$status"
          grep -Fq '?tab=user_admin' "$status"
          grep -Fq 'active access admins' "$status"
          grep -Fq 'inactive profiles: 0' "$status"
          grep -Fq 'Проверка доступа CRM' "$issue_template"
          grep -Fq 'Открыть доступ CRM' "$issue_template"
          grep -Fq 'CRM build: 20260627-access-route-1' "$issue_template"
          grep -Fq 'Доступ: ok / ошибка / не проверялось' "$issue_template"
          grep -Fq 'CRM_ACCESS_TAB_CHECK_2026-06-27.md' "$issue_template"
          grep -Fq 'Проверка доступа CRM' "$checklist"
          grep -Fq 'Открыть доступ CRM' "$checklist"
          grep -Fq 'CRM build: 20260627-access-route-1' "$checklist"
          grep -Fq 'Доступ`.' "$checklist"
          grep -Fq 'Проверка доступа CRM' "$report"
          grep -Fq 'Открыть доступ CRM' "$report"
          grep -Fq 'CRM build: 20260627-access-route-1' "$report"
          grep -Fq 'Доступ: ok / ошибка / не проверялось' "$report"
