name: CRM access quick link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-crm-access-quick-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CRM access quick link
        shell: bash
        run: |
          set -euo pipefail
          index='crm/v4/index.html'
          menu='crm/v4/assets/v4/crm-v4-expanded-menu-v1.js'
          runbook='docs/CRM_ACCESS_TAB_CHECK_2026-06-27.md'
          status='docs/STATUS.md'
          issue_template='.github/ISSUE_TEMPLATE/crm-v4-browser-test.md'
          checklist='docs/CRM_V4_TESTER_CHECKLIST.md'
          report='docs/CRM_V4_BROWSER_TEST_REPORT.md'
          access_doc='docs/CRM_V4_TEST_ACCESS.md'
          onboarding='docs/CRM_ADMIN_TESTER_ONBOARDING.md'
          selfcheck='docs/CRM_V4_SELFCHECK.md'
          manual='docs/MANUAL_TEST_CHECKLIST.md'
          test -f "$index"
          test -f "$menu"
          test -f "$runbook"
          test -f "$status"
          test -f "$issue_template"
          test -f "$checklist"
          test -f "$report"
          test -f "$access_doc"
          test -f "$onboarding"
          test -f "$selfcheck"
          test -f "$manual"
          grep -Fq 'href="?tab=user_admin"' "$index"
          grep -Fq 'Открыть доступ CRM' "$index"
          grep -Fq 'Доступ и роли' "$index"
          grep -Fq 'data-v4-tab-button="user_admin"' "$index"
          grep -Fq 'crm-v4-tabs-lite.js?v=20260627-access-route-1' "$index"
          grep -Fq 'crm-v4-expanded-menu-v1.js?v=20260628-access-label-1' "$index"
          grep -Fq 'auth.js?v=20260627-access-3' "$index"
          grep -Fq "{ tab: 'user_admin', label: 'Доступ и роли' }" "$menu"
          grep -Fq 'Открыть доступ CRM' "$runbook"
          grep -Fq 'Доступ и роли' "$runbook"
          grep -Fq 'href="?tab=user_admin"' "$runbook"
          grep -Fq 'active access admins' "$runbook"
          grep -Fq 'inactive profiles: 0' "$runbook"
          grep -Fq 'Открыть доступ CRM' "$status"
          grep -Fq '?tab=user_admin' "$status"
          grep -Fq 'active access admins' "$status"
          grep -Fq 'inactive profiles: 0' "$status"
          grep -Fq 'Проверка доступа CRM' "$issue_template"
          grep -Fq 'Открыть доступ CRM' "$issue_template"
          grep -Fq 'CRM build: 20260627-access-route-1' "$issue_template"
          grep -Fq 'Доступ: ok / ошибка / не проверялось' "$issue_template"
          grep -Fq 'CRM_ACCESS_TAB_CHECK_2026-06-27.md' "$issue_template"
          grep -Fq 'Проверка доступа CRM' "$checklist"
          grep -Fq 'Открыть доступ CRM' "$checklist"
          grep -Fq 'CRM build: 20260627-access-route-1' "$checklist"
          grep -Fq 'Доступ`.' "$checklist"
          grep -Fq 'Проверка доступа CRM' "$report"
          grep -Fq 'Открыть доступ CRM' "$report"
          grep -Fq 'CRM build: 20260627-access-route-1' "$report"
          grep -Fq 'Доступ: ok / ошибка / не проверялось' "$report"
          grep -Fq 'Текущая модель доступа' "$access_doc"
          grep -Fq 'Обычный путь для тестировщиков и сотрудников — только invite через вкладку `Доступ`' "$access_doc"
          grep -Fq 'Открыть доступ CRM' "$access_doc"
          grep -Fq 'Emergency manual path' "$access_doc"
          grep -Fq 'новый пользователь без invite активируется автоматически' "$access_doc"
          grep -Fq 'Прямая ссылка на раздел Доступ' "$onboarding"
          grep -Fq 'Открыть доступ CRM' "$onboarding"
          grep -Fq 'CRM build: 20260627-access-route-1' "$onboarding"
          grep -Fq 'видны пользователи CRM и приглашения' "$onboarding"
          grep -Fq 'Маршрут Доступ' "$selfcheck"
          grep -Fq 'crm-ui-selfcheck-v1.js?v=20260627-access-route-1' "$selfcheck"
          grep -Fq 'leader-public-lead` v9' "$selfcheck"
          grep -Fq 'leader-crm-leads` v12' "$selfcheck"
          grep -Fq 'Открыть доступ CRM' "$selfcheck"
          grep -Fq 'Проверка вкладки `Доступ`' "$manual"
          grep -Fq 'CRM build: 20260627-access-route-1' "$manual"
          grep -Fq 'пользователь без invite остаётся pending/inactive' "$manual"
          grep -Fq 'повторный `request_id` фиксируется как `accepted`, а не `duplicate`' "$manual"